name: Update store prices

on:
  schedule:
    # Every 3 days at 13:00 UTC (~6-9am US). Adjust cadence here.
    - cron: '0 13 */3 * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send a synthetic test drop alert (Discord + email)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest prices
        id: fetch
        env:
          # Add these under Settings → Secrets and variables → Actions.
          # Unset secrets resolve to "" → the feature gracefully no-ops.
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_ALERT: ${{ inputs.test_alert }}
        run: |
          node tools/update-prices.mjs
          if [ -s tools/last-run-drops.json ] && [ "$(jq 'length' tools/last-run-drops.json)" -gt 0 ]; then
            echo "has_drops=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_drops=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email price drops
        if: steps.fetch.outputs.has_drops == 'true'
        continue-on-error: true   # don't fail the run if mail creds aren't set yet
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🔻 Ryan Retro price drops"
          to: rowdyrake@gmail.com
          from: Ryan Retro Price Bot <${{ secrets.MAIL_USERNAME }}>
          html_body: file://tools/email-body.html

      - name: Commit updated price data if changed
        run: |
          if git diff --quiet -- static/prices.json static/drops.json static/price-history.json; then
            echo "No price changes."
          else
            git config user.name  "ryanretro-price-bot"
            git config user.email "actions@github.com"
            git add static/prices.json static/drops.json static/price-history.json
            git commit -m "chore: auto-update store prices [skip ci]"
            git push
          fi
