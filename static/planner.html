<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Retro — Creator Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --page:#dfe9fb; --sheet:#f3f8ff; --card:#FFFFFF; --ink:#1a1a1a; --title:#3b3a8d;
  --bord:#3b3c89; --line:#3b3c89; --rule:#d4e4ff; --sep:#d4e4ff; --soft:#9fb0d4;
  --brand:#3b3a8d; --dark:#2d2c6e; --light:#d3e4ff;
  --teal:#208ab0; --teal-bg:#e5f9ff;
  --green:#107a47; --green-bg:#e6faf3;
  --blue:#3a69b9; --blue-bg:#d3e4ff;
  --purple:#6b46c1; --purple-bg:#efe9fb;
  --amber:#b5701a; --amber-bg:#fdf3df;
  --rose:#d6336c; --rose-bg:#fdeaf2;
  --pop:#b5701a; --red:#c0392b; --orange:#b5701a; --pink:#d6336c; --cyan:#208ab0;
  --band:var(--blue-bg); --bandText:var(--blue);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--page); color:var(--ink);
  font-family:'Poppins',Arial,sans-serif;
  min-height:100vh; padding-bottom:70px;
  font-size:13.5px; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.bebas{font-family:'Poppins',Arial,sans-serif; font-weight:700; letter-spacing:0; margin:0;}
button{font-family:inherit; cursor:pointer;}
textarea,input,select{font-family:inherit; color:var(--ink);}
::placeholder{color:#9fb0d4;}

/* ---------- header ---------- */
.topbar{
  position:sticky; top:0; z-index:50; background:var(--sheet);
  border-bottom:2px solid var(--title); padding:10px 20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.logo{display:flex; align-items:center; gap:12px;}
.logo .play{width:42px; height:31px; background:var(--title); border-radius:8px; display:flex; align-items:center; justify-content:center; flex:none;}
.logo .play::after{content:""; border-left:13px solid #fff; border-top:8px solid transparent; border-bottom:8px solid transparent; margin-left:4px;}
.logo h1{font-size:23px; line-height:1.05; color:var(--title); letter-spacing:-0.8px;}
.logo h1 span{color:var(--teal);}
.feebadge{display:inline-flex; align-items:center; gap:5px; background:#1f9d57; color:#fff;
  font-weight:800; font-size:13px; padding:5px 12px; border-radius:999px; letter-spacing:.2px;
  border:1.5px solid #0f5e34; box-shadow:0 1px 0 rgba(0,0,0,.08); white-space:nowrap;}
.feebadge small{font-weight:700; font-size:9.5px; opacity:.85; text-transform:uppercase; letter-spacing:.6px;}
.vcard .feebadge{font-size:11px; padding:3px 9px;}
.vcard .feebadge small{display:none;}
body.dark .feebadge{background:#1f9d57; border-color:#0f5e34;}
.savedot{margin-left:auto; font-size:11.5px; font-weight:600; color:var(--soft); display:flex; align-items:center; gap:6px;}
.topbar-actions{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
@media (max-width:560px){
  .topbar{padding:10px 14px; gap:8px;}
  .topbar-actions{gap:6px; width:100%;}
  .topbar-actions .btn{padding:6px 11px; font-size:11.5px; flex:1 1 auto;}
}
.savedot i{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;}

/* ---------- tabs ---------- */
.tabs{
  display:flex; gap:6px; padding:14px 20px 0; max-width:1240px; margin:0 auto;
  overflow-x:auto; scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  border:1px solid var(--bord); border-radius:8px; background:#fff; color:var(--title);
  font-weight:600; font-size:12.5px; padding:6px 13px;
  white-space:nowrap; transition:background .12s;
}
.tab:hover{background:var(--teal-bg);}
.tab.active{background:var(--title); border-color:var(--title); color:#fff;}
.tab .em{margin-right:6px;}

.wrap{max-width:1240px; margin:14px auto 0; padding:20px 24px 34px; background:var(--sheet); border:2px solid var(--title); border-radius:4px;}
@media(max-width:1280px){.wrap{margin:14px 16px 0;}}
.view{display:none; animation:pop .15s ease;}
.view.show{display:block;}
@keyframes pop{from{opacity:0;} to{opacity:1;}}
@media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }

/* ---------- panels ---------- */
.card{background:var(--card); border:1px solid var(--bord); border-radius:3px; padding:12px;}
.card+.card{margin-top:20px;}
.card h2{
  font-size:13px; font-weight:600; letter-spacing:.3px; color:var(--bandText); background:var(--band);
  margin:-12px -12px 12px; padding:8px 12px; position:relative;
  display:flex; align-items:center; justify-content:center; gap:9px; text-align:center;
}
.card h2 .h2-btn{position:absolute; right:7px; top:50%; transform:translateY(-50%); padding:3px 10px; font-size:11px; border-radius:5px;}
.titlecard{padding:18px 16px 12px; text-align:center;}
.bigtitle{width:100%; border:none; background:transparent; font-family:'Poppins',Arial,sans-serif; font-weight:700;
  font-size:clamp(26px,3.6vw,46px); line-height:1.12; color:var(--title); text-align:center; letter-spacing:-1.5px; padding:2px 6px;
  resize:none; overflow:hidden; display:block;}
.bigtitle:focus{outline:none; background:#eef5ff; border-radius:4px;}
body.dark .bigtitle{color:var(--title);}
body.dark .bigtitle:focus{background:#222837;}
.bigtitle-static{width:auto; cursor:default; user-select:text;}
#filmPickCard{position:relative; cursor:pointer;}
#filmPickCard .bigtitle-static{cursor:pointer; user-select:none;}
#filmPickCard:hover{background:#fafcff;}
body.dark #filmPickCard:hover{background:#262C3A;}
.bigtitle-select{position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:pointer; appearance:none; border:none;}
.modeseg{display:inline-flex; border:1.5px solid var(--title); border-radius:8px; overflow:hidden; flex:none;}
.modeseg button{border:0; background:transparent; color:var(--title); font-weight:700; font-size:12.5px; padding:7px 18px; cursor:pointer; line-height:1.35; transition:background .12s;}
.modeseg button + button{border-left:1.5px solid var(--title);}
.modeseg button.active{background:var(--title); color:#fff;}
body.dark .modeseg button.active{color:#14171E;}
.detail-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
.film-head{display:flex; justify-content:center; margin-bottom:4px;}
.title-caret{font-size:.42em; color:var(--soft); margin-left:12px; vertical-align:middle; letter-spacing:0;}
.card h2 .chip{font-size:9.5px; font-weight:600; letter-spacing:.05em;
  background:#fff; border:1px solid var(--sep); border-radius:20px; padding:2px 8px; color:var(--soft);}
.hint{font-size:12px; color:var(--soft); margin:0 0 12px; text-align:center;}
.bar{height:6px; border:1px solid var(--bord); border-radius:20px; background:#fff; overflow:hidden;}
.bar i{display:block; height:100%; background:var(--green); transition:width .25s;}

/* colored header bands per panel */
.edge{--band:var(--blue-bg); --bandText:var(--blue);}
.edge.yellow{--band:var(--purple-bg); --bandText:var(--purple);}
.edge.green{--band:var(--green-bg); --bandText:var(--green);}
.edge.blue{--band:var(--teal-bg); --bandText:var(--teal);}
.edge.pink{--band:var(--rose-bg); --bandText:var(--rose);}
.edge.orange{--band:var(--amber-bg); --bandText:var(--amber);}

/* ---------- buttons ---------- */
.btn{
  border:1px solid var(--bord); border-radius:5px; background:#fff; font-weight:600; font-size:12px;
  padding:6px 12px; transition:background .12s; color:var(--title);
  display:inline-flex; align-items:center; justify-content:center; gap:7px; line-height:1.35;
}
.btn:hover{background:var(--teal-bg);}
.btn.brand{background:var(--title); border-color:var(--title); color:#fff;}
.btn.brand:hover{background:var(--dark);}
.btn.pop{background:var(--amber-bg); border-color:#e3c890; color:var(--amber);}
.btn.pop:hover{background:#f8e9c8;}
.btn.green{background:var(--green); border-color:var(--green); color:#fff;}
.btn.red{background:#fff; border-color:#d8a8a2; color:var(--red);}
.btn.red:hover{background:#fdeeec;}
.btn.ghost{padding:5px 10px; font-size:12px; color:var(--title);}
.btn:disabled{opacity:.55; cursor:default;}
.btn.big{font-size:13.5px; padding:9px 18px; border-radius:6px; font-weight:600;}

/* ---------- inputs ---------- */
.ta{
  width:100%; border:1px solid var(--bord); border-radius:3px; padding:10px 12px; font-size:13px;
  line-height:26px; background-color:#fff; resize:vertical; min-height:120px;
}
.ta.flat{
  border:none; border-radius:0; padding:0 2px 10px;
  /* ruled rows start exactly at the first text line: first rule sits UNDER row 1, nothing above it */
  background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 25px,var(--sep) 25px,var(--sep) 26px);
  background-attachment:local; background-position:0 0; background-origin:content-box;
}
.ta.flat:focus{box-shadow:none; background-color:transparent;}
.ta:focus,.in:focus,select:focus{outline:none; box-shadow:inset 0 0 0 2px var(--teal); background-color:#eef5ff;}
.tab:focus-visible,.btn:focus-visible{outline:2px solid var(--teal); outline-offset:1px;}
.in{width:100%; border:1px solid var(--bord); border-radius:5px; padding:8px 11px; font-size:13px; background:#fff;}
select.in{appearance:none; font-weight:600; color:var(--title);}
.row{display:flex; gap:9px; flex-wrap:wrap; align-items:center;}
.grow{flex:1; min-width:160px;}
label.lbl{font-size:10.5px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:var(--teal); display:block; margin:12px 0 5px;}

/* checkboxes — sheet style */
input[type=checkbox]{appearance:none; width:17px; height:17px; border:2px solid var(--title); border-radius:4px; cursor:pointer; position:relative; background:#fff; flex:0 0 auto;}
input[type=checkbox]:checked{background:var(--green); border-color:var(--green);}
input[type=checkbox]:checked::after{content:""; position:absolute; left:4px; top:0; width:4px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);}

/* ---------- brain dump ---------- */
#dumpText{min-height:260px;}
.inspo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-top:12px;}
.inspo{position:relative; border:1px solid var(--bord); border-radius:6px; overflow:hidden; background:#fff;}
.inspo img{width:100%; aspect-ratio:16/10; object-fit:cover; display:block;}
.inspo input{width:100%; border:none; border-top:1px solid var(--sep); padding:6px 9px; font-size:12px; background:#fff;}
.inspo .x{position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%; border:none;
  background:rgba(0,0,0,.55); color:#fff; font-size:14px; line-height:1; padding:0;}
.dropzone{
  border:1.5px dashed var(--bord); border-radius:6px; padding:16px; text-align:center; color:var(--soft);
  font-weight:500; font-size:12.5px; background:#f7faff; margin-top:4px; cursor:pointer;
}
.dropzone.drag{background:var(--purple-bg); border-color:var(--purple); color:var(--purple);}

/* ---------- video cards ---------- */
.vid-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px;}
.vcard{
  background:#fff; border:1px solid var(--bord); border-radius:8px; overflow:hidden;
  cursor:pointer; transition:.15s; text-align:left; padding:0; display:flex; flex-direction:column;
}
.vcard:hover{box-shadow:0 8px 22px rgba(59,58,141,.20); transform:translateY(-2px);}
.vcard .thumb{aspect-ratio:16/9; background:repeating-linear-gradient(45deg,#eef3fc,#eef3fc 11px,#e4ecfa 11px,#e4ecfa 22px);
  border-bottom:1px solid var(--bord); display:flex; align-items:center; justify-content:center; font-size:28px; position:relative; color:var(--soft);}
.vcard .thumb img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
.vcard .body{padding:10px 12px;}
.vcard h3{font-size:14px; line-height:1.3; font-weight:600; color:var(--ink);}
.vcard .meta{display:flex; gap:7px; margin-top:7px; flex-wrap:wrap; align-items:center;}
.status{font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; border-radius:20px; padding:2px 9px;}
.status.Idea{background:#edf1fa; color:#6a74a8;} .status.Planning{background:var(--purple-bg); color:var(--purple);} .status.Filming{background:var(--amber-bg); color:var(--amber);}
.status.Editing{background:var(--teal-bg); color:var(--teal);} .status.Published{background:var(--green-bg); color:var(--green);}
.mini{font-size:11px; font-weight:500; color:var(--soft);}

/* ---------- video detail ---------- */
.crumb{display:flex; align-items:center; gap:9px; margin-bottom:14px; flex-wrap:wrap;}
.crumb select.in{padding:5px 26px 5px 10px; font-size:12px; border-radius:5px; line-height:1.35;
  background-image:linear-gradient(45deg,transparent 50%,var(--title) 50%),linear-gradient(135deg,var(--title) 50%,transparent 50%);
  background-position:calc(100% - 14px) 55%,calc(100% - 10px) 55%; background-size:4px 4px,4px 4px; background-repeat:no-repeat;}
body.dark .crumb select.in{background-color:#2A3040;}
.title-row{display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap;}
.title-row .in{font-size:16px; font-weight:600;}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;}
.two-col > .card{margin-top:0;}
@media(max-width:860px){.two-col{grid-template-columns:1fr;}}

.idea-li{display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--sep); padding:7px 2px; background:#fff;}
.idea-li:last-child{border-bottom:none;}
.idea-li.star{background:#fdf8ec;}
.idea-li .t{flex:1; font-weight:500; font-size:13px; border:none; background:transparent; padding:2px;}
.icon-btn{width:28px; height:28px; border:1px solid var(--bord); border-radius:5px; background:#fff; font-size:13px; line-height:1; flex:none; color:var(--title);}
.icon-btn:hover{background:var(--teal-bg);}
.icon-btn.on{background:var(--amber-bg); border-color:#e3c890;}

.thumb-comp{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:4px;}
@media(max-width:640px){.thumb-comp{grid-template-columns:1fr;}}
.tslot{border:1px solid var(--bord); border-radius:5px; overflow:hidden; background:#fff; position:relative; transition:.15s;}
.tslot .label{position:absolute; top:7px; left:7px; z-index:2; background:#fff; color:var(--title); font-weight:600; font-size:11px; padding:2px 10px; border-radius:20px; border:1px solid var(--bord);}
.tslot .ph{aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:5px; color:var(--soft); font-weight:500; font-size:12px; cursor:pointer; width:100%; border:none;
  background:repeating-linear-gradient(45deg,#eef3fc,#eef3fc 11px,#e4ecfa 11px,#e4ecfa 22px);}
.tslot img{width:100%; aspect-ratio:16/9; object-fit:cover; display:block; cursor:pointer;}
.tslot .foot{display:flex; border-top:1px solid var(--sep); background:#fafcff;}
.tslot .foot button{flex:1; border:none; background:transparent; font-weight:600; font-size:11px; padding:7px 4px; color:var(--title);}
.tslot .foot button:hover{background:var(--teal-bg);}
.tslot .foot button+button{border-left:1px solid var(--sep);}
.tslot.win{border:2px solid var(--green); box-shadow:0 0 0 3px var(--green-bg);}
.tslot.win .label{background:var(--green); border-color:var(--green); color:#fff;}

.todo-li{display:flex; gap:9px; align-items:center; border-bottom:1px solid var(--sep); padding:7px 2px; background:#fff;}
.todo-li:last-child{border-bottom:none;}
.todo-li input[type=checkbox]{margin-top:0;}
.todo-li .t{flex:1; font-weight:500; font-size:13px; border:none; background:transparent;}
.todo-li.done .t{text-decoration:line-through; color:var(--soft);}
textarea.t{resize:none; overflow:hidden; line-height:1.5; padding:0; margin:0; display:block; width:100%; min-height:20px;}
textarea.ta{resize:none; overflow:hidden;}

/* ---------- filming mode ---------- */
.film-check{display:flex; flex-direction:column; margin-top:6px; background:#fff; border:1px solid var(--bord); border-radius:3px;}
.fitem{display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--sep); background:#fff;
  padding:11px 12px; font-size:14px; font-weight:500; cursor:grab; user-select:none;}
.fitem.dragging{opacity:.45; cursor:grabbing;}
.fitem textarea{cursor:text;}
.fitem input[type=checkbox], .fitem .icon-btn{cursor:pointer;}
.fitem:last-child{border-bottom:none;}
.fitem input[type=checkbox]{width:19px; height:19px; margin-top:0;}
.fitem input[type=checkbox]:checked::after{left:5px; top:1px;}
.fitem.done{color:var(--soft);}
.fitem textarea{flex:1; border:none; background:transparent; font-weight:500; font-size:14px; line-height:1.5; resize:none; overflow:hidden; padding:0; margin:0; min-height:21px;}
.fitem.done textarea{text-decoration:line-through; color:var(--soft);}
.fsec{margin-top:20px;}
.fsec h3{font-size:14px; font-weight:600; color:var(--title); display:flex; align-items:center; gap:8px; margin-bottom:6px;}
.fsec h3 .cnt{font-size:10.5px; font-weight:600; background:#edf1fa; border-radius:20px; padding:2px 9px; color:var(--soft);}
.fdiv{background:var(--cbg); border-bottom:1px solid var(--sep); padding:4px 12px; gap:9px; min-height:0;}
.fdiv .secname{flex:1; text-align:center; font-weight:600; font-size:13px; letter-spacing:.3px;
  color:var(--c); line-height:1.4; background:transparent; min-height:18px;}
.fdiv .icon-btn{background:transparent; border-color:transparent; color:var(--c); opacity:.6; width:24px; height:24px;}
.fdiv .icon-btn:hover{opacity:1; background:rgba(255,255,255,.35);}
body.dark .fdiv .icon-btn:hover{background:rgba(0,0,0,.25);}
.secc-teal{--c:var(--teal); --cbg:var(--teal-bg);} .secc-blue{--c:var(--blue); --cbg:var(--blue-bg);}
.secc-green{--c:var(--green); --cbg:var(--green-bg);} .secc-purple{--c:var(--purple); --cbg:var(--purple-bg);}
.secc-amber{--c:var(--amber); --cbg:var(--amber-bg);} .secc-rose{--c:var(--rose); --cbg:var(--rose-bg);}
.fadd{display:flex; gap:8px; margin-top:10px;}
.fadd input{flex:1; border:1px solid var(--bord); border-radius:5px; padding:8px 11px; font-size:13px; background:#fff;}
.fadd input:focus{outline:none; box-shadow:inset 0 0 0 2px var(--teal); background:#eef5ff;}
.sticky-prog{position:sticky; top:56px; z-index:30; background:var(--amber-bg); border:1px solid var(--bord); border-radius:5px;
  padding:9px 13px; display:flex; align-items:center; gap:12px; font-weight:600; font-size:13px; color:var(--amber);}
.sticky-prog .btn{background:#fff;}
body.dark .sticky-prog .btn{background:#2A3040; color:#C9CEE4; border-color:var(--bord);}
.sponsor-flag{background:var(--rose-bg); border:1px solid var(--bord); border-radius:5px; padding:11px 13px; margin-top:14px; font-size:13px; color:var(--rose);}

/* ---------- thumbnail lab ---------- */
.yt{display:grid; gap:18px 14px; margin-top:14px;}
.yt.desktop{grid-template-columns:repeat(auto-fill,minmax(225px,1fr));}
.yt.mobile{grid-template-columns:1fr; max-width:420px; margin-left:auto; margin-right:auto;}
.yt.tiny{grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;}
.ytc{cursor:default;}
.ytc .tn{aspect-ratio:16/9; border-radius:8px; overflow:hidden; background:#e4ecfa; position:relative; border:1px solid var(--bord);}
.ytc .tn img{width:100%; height:100%; object-fit:cover; display:block;}
.ytc .tn .dur{position:absolute; right:6px; bottom:6px; background:rgba(0,0,0,.8); color:#fff; font-size:10.5px; font-weight:600; padding:1px 5px; border-radius:4px;}
.ytc .info{display:flex; gap:9px; margin-top:7px;}
.ytc .av{width:30px; height:30px; border-radius:50%; background:var(--blue-bg); color:var(--title); flex:none; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:12px;}
.ytc .tt{font-size:13px; font-weight:600; line-height:1.3; max-height:2.6em; overflow:hidden;}
.ytc .ch{font-size:11.5px; color:var(--soft); margin-top:2px;}
.ytc.mine .tn{outline:3px solid var(--amber); outline-offset:2px;}
.yt.hidemine .ytc.mine .tn{outline:none;}
.ytc .rm{position:absolute; top:5px; left:5px; width:22px; height:22px; border-radius:50%; border:none; background:rgba(0,0,0,.55); color:#fff; font-size:13px; line-height:1; z-index:3; padding:0;}
.lab-ctrl{display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-top:2px; justify-content:center;}
.lab-ctrl+.lab-ctrl{margin-top:10px;}
.seg{display:inline-flex; border:1px solid var(--bord); border-radius:5px; overflow:hidden; background:#fff;}
.seg button{border:none; background:#fff; font-weight:600; font-size:12px; padding:7px 13px; color:var(--title);}
.seg button+button{border-left:1px solid var(--sep);}
.seg button.on{background:var(--title); color:#fff;}
.seg button:not(.on):hover{background:var(--teal-bg);}

/* ---------- modal ---------- */
.overlay{position:fixed; inset:0; background:rgba(20,22,45,.7); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:24px 14px; overflow:auto;}
.overlay.show{display:flex;}
.modal{background:var(--sheet); border:2px solid var(--title); border-radius:6px; box-shadow:0 12px 50px rgba(0,0,0,.35); max-width:760px; width:100%; padding:20px;}
.modal h2{font-size:20px; color:var(--title); letter-spacing:-0.4px;}
.file-card{border:1px solid var(--bord); border-radius:5px; background:#fff; padding:11px 14px; margin-top:12px;}
.file-card .dest{font-weight:600; font-size:13px; color:var(--title); display:flex; align-items:center; gap:8px;}
.file-card ul{margin:7px 0 0; padding-left:20px; font-size:12.5px;}

.dest-dot{width:10px; height:10px; border-radius:50%; display:inline-block;}

.toast{position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:var(--title); color:#fff;
  font-weight:500; font-size:12.5px; padding:10px 18px; border-radius:6px; box-shadow:0 6px 22px rgba(20,22,45,.3);
  z-index:200; display:none; max-width:90vw;}
.toast.show{display:block; animation:pop .2s;}
.spinner{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:26px; text-align:center; color:var(--soft); font-weight:500; font-size:12.5px;}
.empty .big-em{font-size:36px; display:block; margin-bottom:8px;}
hr.div{border:none; border-top:1px solid var(--sep); margin:16px 0;}

@media (max-width:600px){

};

to share the food so I don't get full after 5 stalls."},{"t": "I Waited 8 Months for the Odin 3 to Get Good (Review & Giveaway)","n": "Giveaway rules: Just comment, drawn in 2 weeks.\nMake sure to mention the ongoing bugs that STILL haven't been fixed after 8 months.\nLink to Korean channel in the description and pinned comment.\nRelevant Reddit thread: https://www.reddit.com/r/OdinHandheld/s/azrc2TLZ1P\nRelevant YT Post: http://youtube.com/post/UgkxTY3tcoioZY_0MbMHvzKUGlup8AgKE_KS?si=njrry8pdeSsU_LsK"},{"t": "Anbernic FIXED the RG DS! (Official Linux Update)","n": "Key features to highlight from the official video:\n• Seamless dual-boot (removing the TF card reboots back to Android).\n• 3 new UI themes (Dark, Light, Classic).\n• Independent brightness controls for top and bottom screens.\n• Secondary screen displays platform logos during single-screen emulation (no more dead black screen)."},{"t": "Escaping Seoul: A Quiet Korean Countryside Vlog","n": "Pacing is crucial here! Do not linger on boring, long scenes. Keep the edit tight. Ensure all Korean speaking interactions have clean, easy-to-read subtitles."},{"t": "I Tried Wireless HDMI For My Handhelds (Llano S850)","n": "Testing to-do checklist:\n• Compare latency: Android native cast to TV VS Android cast to Llano Receiver VS Llano Transmitter to Llano Receiver.\n• Test AirPlay replacement for the living room (since Mac Mini is gone).\n• Thermal camera test on the receiver (packaging says hot is normal, let's see HOW hot)."},{"t": "Can I Get My Girlfriend to Approve of the AYN Thor?","n": "Need to find a pastel skin/case, cute thumb grips (paw prints/flowers), and maybe a charm. Set up Daijisho/Beacon or standard Android with a custom girly theme and widgets. Load up 'cozy' games: Animal Crossing, Nintendogs, Stardew Valley. Add Netflix and Spotify."},{"t": "The Best 3D Printed Accessories for the AYN Thor","n": "Featured grips to print:\n• Thor Grip V5\n• Thor Xbox Style Grip\n• Thor Slim Grip - Switch 2 Joycon Style\n• Thor Slim Grip\n• Thor Grip Medium Version\n• Unofficial Official Ryan Retro Channel Thor Grip\n\nResearch needed: Find the best cases, docks, and weird accessories. Make sure to buy black paper/card for the desk snap transition."},{"t": "Why the AYN Thor is THE BEST Handheld","n": "Cover: EQ fix, using bottom screen as a launcher, adding a grip, controlling bottom screen volume independently, app switching between screens."},{"t": "Turning My Apple Watch Into a Game Boy","n": "Research needed: Check MakerWorld or Thingiverse for the best Apple Watch Game Boy case. Need to figure out the best current watchOS emulator (e.g., Arcadia or a web-based workaround)."},{"t": "The Best Handheld Under $100","n": "Contenders to cover: Ayaneo Pocket Air Mini, Mangmi Air X, TrimUI Brick."},{"t": "The Ultimate Docked Handheld Setup (Auto Controller Mapping)","n": "Testing checklist for standalone apps: Eden, GameNative, Flycast, Redream, Dolphin. I need to figure out which of these handle controller hot-swapping or auto-profiles well before filming."},{"t": "GameNative: PC Games on Android","n": "Title: The Best Way To Play ALL Your PC Games On Android.\nThumbnail: Steam, GOG, Epic icons. Huge recognisable game titles.\nGitHub: https://github.com/utkarshdalal/GameNative\nPerformance fork (SD 8 Gen 2+): https://github.com/maxjivi05/GameNative-Performance\nDifferentiator: simplest setup guide on YouTube plus Thor 2nd screen as touchpad plus performance fork demo."},{"t": "Dock Style Comparison","n": "Titles:\n• The Best Handheld Dock\n• What Handheld Dock Do You Need?\n• One Dock To Rule Them All\n\nThumbnail: Holding the Jumpgate dock in the middle, glowing edge, all kinds of handhelds around it (Steam Deck, Switch 2, MacBook).\n\nTarget audience: Handheld gamers (Switch, Steam Deck, Retroid) and laptop users wanting a portable desk setup."},{"t": "Real DS vs Clone vs Thor","n": "Target: Retro gaming enthusiasts, handheld collectors, DS fans.\nThe Twist: The best overall choice is probably neither - it is the AYN Thor.\nRG DS closer in size to DS XL.\nGammaOS: lighter Android, snappier. Rocknix: simpler Linux alternative.\nR4 card: 4,300 games pre-loaded. No affiliate links for R4 cards.\nRG DS exclusives: Light Dreamcast, PortMaster, Android apps, web browser, YouTube."},{"t": "EVERY Pokemon Game EVER on the AYN Thor","n": "Thumbnail concepts:\n1. AYN Thor center with Pokeball joystick caps, flat-lay of iconic Pokemon game boxes and holographic cards, pixel-art grass texture background.\n2. Dual-screen: Z-A on top (modern 3D) vs Pokemon Red on bottom (8-bit). Pokeball caps on sticks.\n3. Huge pile of loose Pokemon carts on the floor. You standing next to it for scale.\nGet Pokeball stick caps for the shoot."},{"t": "Gaming on a Credit Card Sized PC","n": "Titles:\n1. This $30 credit card is a Gaming Computer\n2. Gaming on a Credit Card sized PC\n3. This $30 credit card is a Gaming PC\n\nThumbnail: Mario gameplay visible. Device shown coming out of wallet or pack of cards. $30 price tag overlay. Gaming PC text overlay. Chandler from Friends reading specs.\nReddit: https://www.reddit.com/r/CardPuter/\n3D printed case: https://makerworld.com/models/2417770\nCardputer Fight: https://www.reddit.com/r/CardPuter/comments/1t4gnrn/cardputer_fight/"},{"t": "Tiny iPhone Video Project","n": "Thumbnail: Tiny iPhone in the middle surrounded by handheld controllers for each system tested (NES, SNES, PS1, Dreamcast, arcade stick). Include a real-sized iPhone next to it for scale.\nOS: runs Android.\nDisclaimer: not a mainstream recommendation."},{"t": "Broken Phone to PC","n": "Title: I Turned My Old Broken Phone Into A PC.\nThumbnail: Smashed phone transitioning to a PC setup.\nTarget audience: tech, environment, renewing/restoring, cheap PCs.\nResearch needed: which Android phones support desktop mode and how. DeX for Samsung, other options for other phones."},{"t": "Cannoli MinUI for Android","n": ""},{"t": "Playing Wii Games on my Phone","n": ""},{"t": "Play Retro Games With Friends Online — Foxol","n": "https://play.foxol.app/"}];

let saveTimer = null, dirty = false;

/* Self-host backend: localStorage for state, IndexedDB for images (localStorage is too small for them) */
const idb = {
  db: null,
  open(){ return new Promise((res, rej) => {

    const r = indexedDB.open('rr-planner-img', 1);

    tx.oncomplete = res; tx.onerror = () => rej(tx.error); });},
  async get(k){ const db = await this.open(); return new Promise((res, rej) => {
    const rq = db.transaction('img').objectStore('img').get(k);
    rq.onsuccess = () => res(rq.result == null ? null : rq.result); rq.onerror = () => rej(rq.error); });},
  async del(k){ const db = await this.open(); return new Promise((res, rej) => {
    const tx = db.transaction('img', 'readwrite'); tx.objectStore('img').delete(k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error); });}
};

/* Remote sync (self-hosted only): set a token via the Sync button and every
   device pointing at ryanretro.com shares one live copy through /api/planner. */
const SYNC_PATH = '/api/planner';
const syncToken = () => { try { return localStorage.getItem('planner_sync_token') || ''; } catch(e){ return ''; } };
const storageMode = () => isArtifact ? 'artifact' : (syncToken() ? 'remote' : 'local');

let syncErrAt = 0;
function noteSyncError(status){
  if (Date.now() - syncErrAt < 8000) return;      // don't spam during retries
  syncErrAt = Date.now();
  const why = status === 401 ? 'token rejected — tap Sync and re-paste it'
    : status === 404 ? 'API route not found — is planner_api deployed?'
    : status === 422 ? 'server rejected the data format'
    : status >= 500 ? 'server/database problem — check Railway logs'
    : 'unexpected response';
  toast('Sync error ' + status + ': ' + why);
}
async function remoteFetch(method, sub, value){
  let res;
  try {
    res = await fetch(SYNC_PATH + sub, {
      method,
      headers: Object.assign({ 'Authorization': 'Bearer ' + syncToken() },
        value != null ? { 'Content-Type': 'application/json' } : {}),
      body: value != null ? JSON.stringify({ value }) : undefined
    });
  } catch(e){
    noteSyncError(0);                              // network-level failure
    throw e;
  }
  if (!res.ok && res.status !== 404) noteSyncError(res.status);
  if (res.status === 401) throw new Error('unauthorized');
  return res;
}

async function rawSet(key, value){
  const mode = storageMode();
  if (mode === 'artifact') return window.storage.set(key, value);
  if (mode === 'remote'){
    if (key === 'ping') return;                          // health check is meaningless remotely
    const sub = key.startsWith('img:') ? '/img/' + key.slice(4) : '';
    const res = await remoteFetch('PUT', sub, value);
    if (!res.ok) throw new Error('sync write failed: ' + res.status);
    return;
  }
  if (key.startsWith('img:')) return idb.set(key, value);
  localStorage.setItem(key, value);
}
async function rawGet(key){
  try {
    const mode = storageMode();
    if (mode === 'artifact'){ const r = await window.storage.get(key); return r ? r.value : null; }
    if (mode === 'remote'){
      const sub = key.startsWith('img:') ? '/img/' + key.slice(4) : '';
      const res = await remoteFetch('GET', sub);
      if (res.status === 404) return null;
      if (!res.ok) return null;
      const data = await res.json();
      return data.value == null ? null : data.value;
    }
    if (key.startsWith('img:')) return await idb.get(key);
    return localStorage.getItem(key);
  } catch(e){ return null; }
}
async function rawDelete(key){
  const mode = storageMode();
  if (mode === 'artifact') return window.storage.delete(key);
  if (mode === 'remote'){
    if (!key.startsWith('img:')) return;
    const res = await remoteFetch('DELETE', '/img/' + key.slice(4));
    if (!res.ok && res.status !== 404) throw new Error('sync delete failed');
    return;
  }
  if (key.startsWith('img:')) return idb.del(key);
  localStorage.removeItem(key);
}

const writeQueue = [];
let queueRunning = false;

function queueWrite(op, key, value){
  return new Promise(resolve => {
    if (op === 'set'){
      const existing = writeQueue.find(j => j.op === 'set' && j.key === key);
      if (existing){ existing.value = value; existing.resolvers.push(resolve); return runQueue(); }
    }
    writeQueue.push({ op, key, value, resolvers: [resolve] });
    runQueue();
  });
}
async function runQueue(){
  if (queueRunning) return;
  queueRunning = true;
  while (writeQueue.length){
    const job = writeQueue.shift();
    let ok = false, delay = 800;
    for (let i = 0; i < 5 && !ok; i++){
      try {
        if (job.op === 'set') await rawSet(job.key, job.value);
        else await rawDelete(job.key);
        ok = true;
      } catch(e){
        if (job.op === 'delete'){
          /* a delete "failing" on a key that's already gone is a success */
          const still = await rawGet(job.key);
          if (still === null || still === undefined){ ok = true; break; }
        }
        if (i === 4){
          if (job.op === 'delete') console.warn('storage delete could not confirm for', job.key, '- harmless orphan, ignoring');
          else console.error('storage set gave up for', job.key, e);
        }
        await sleep(delay); delay = Math.min(delay * 2, 8000);
      }
    }
    job.resolvers.forEach(r => r(ok));
    await sleep(500);                     // breathing room between writes
  }
  queueRunning = false;
}
const setWithRetry = (key, value) => queueWrite('set', key, value);

function setSaveUI(status){
  const dot = $('#saveDot i'), txt = $('#saveText');
  if (status === 'saving'){ dot.style.background = 'var(--pop)'; txt.textContent = 'Saving…'; }

async function flushSave(){

}

function editingNow(){

async function pullRemote(){
  if (isArtifact || storageMode() !== 'remote') return;
  if (pulling || dirty || queueRunning || writeQueue.length || editingNow()) return;  // never clobber local work
  pulling = true;
  try {
    const raw = await rawGet('planner_state_v1');
    if (!raw || raw === lastSyncedRaw) return;
    if (raw === JSON.stringify(state)){ lastSyncedRaw = raw; return; }
    if (dirty || queueRunning || writeQueue.length || editingNow()) return;  // re-check after the await
    const incoming = JSON.parse(raw);
    state = Object.assign(state, incoming);
    state.videos.forEach(v => {
      if (!v.say) v.say = [];
      else if (!Array.isArray(v.say)){ const flat = []; Object.values(v.say).forEach(arr => (arr||[]).forEach(p => flat.push(p))); v.say = flat; }
    });
    lastSyncedRaw = raw;
    rerenderCurrentView();
    toast('Updated from your other device');
  } catch(e){ /* offline or mid-write — try again next cycle */ }
  finally { pulling = false; }
}

/* ---- image store: each image its own key ---- */
async function storeImage(file){
  const dataURL = await compress(file);
  const id = uid();
  const ok = await setWithRetry('img:' + id, dataURL);
  if (!ok) throw new Error('storage rejected the image (tap save dot & retry, or try again shortly)');
  imgCache[id] = dataURL;
  return id;
}
async function getImage(id){
  if (!id) return null;
  if (imgCache[id]) return imgCache[id];
  const v = await rawGet('img:' + id);
  if (v){ imgCache[id] = v; return v; }
  return null;
}
async function deleteImage(id){
  delete imgCache[id];
  queueWrite('delete', 'img:' + id);
}
function compress(file){
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onerror = () => rej(new Error('could not read the file'));
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        try {
          const max = 900;
          const scale = Math.min(1, max / img.width);
          const c = document.createElement('canvas');
          c.width = Math.max(1, Math.round(img.width * scale));
          c.height = Math.max(1, Math.round(img.height * scale));
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          res(c.toDataURL('image/jpeg', 0.82));
        } catch(e){ rej(new Error('could not process the image')); }
      };
      img.onerror = () => rej(new Error('not a readable image file'));
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  });
}

/* ---- sync setup (self-hosted): one token, every device shares the server copy ---- */
async function setupSync(){
  const current = syncToken();
  const tok = window.prompt(
    current ? 'Sync token (leave empty to turn sync OFF on this device):' : 'Paste your sync token (PLANNER_TOKEN from the server):',
    current
  );
  if (tok === null) return;
  if (!tok.trim()){
    localStorage.removeItem('planner_sync_token');
    toast('Sync off — this device now saves locally');
    return;
  }
  localStorage.setItem('planner_sync_token', tok.trim());
  /* decide direction: does the server already have a copy? */
  let serverRaw = null;
  try {
    const res = await remoteFetch('GET', '');
    if (res.ok){ const data = await res.json(); serverRaw = data.value; }
  } catch(e){ return; }   // bad token already toasted
  const localEmpty = state.videos.length === 0 && !(state.dump || '').trim() && state.inspo.length === 0;
  const pullServer = () => {
    state = Object.assign({}, state, JSON.parse(serverRaw));
    dumpText.value = state.dump || ''; autoGrow(dumpText);
    applyTheme(); renderInspo(); renderHistory(); renderVideos(); renderFilm();
    toast('Synced — this device now mirrors the server');
  };
  if (serverRaw && localEmpty){
    /* empty device + server has data: only one sane outcome — never offer the overwrite */
    pullServer();
    return;
  }
  if (serverRaw){
    if (confirm('The server already has planner data.\n\nOK = load the server copy onto this device (recommended)\nCancel = decide what to do next')){
      pullServer();
      return;
    }
    /* explicit, double-confirmed push — overwriting the server must be deliberate */
    if (!confirm('OVERWRITE the server with THIS device\'s data instead?\n\nThe server copy will be replaced (one previous version is kept server-side as a safety net).\n\nOK = overwrite the server\nCancel = do nothing')){
      toast('Nothing changed — sync is on, no data was moved');
      return;
    }
  }
  /* push local copy up (state + all referenced images) */
  toast('Uploading this device\'s planner to the server…');
  for (const id of referencedImageIds()){
    const val = await getImage(id);
    if (val) queueWrite('set', 'img:' + id, val);
  }
  queueWrite('set', 'planner_state_v1', JSON.stringify(state));
  toast('Sync on — server now mirrors this device');
}

/* ---- backup & restore (works in Claude and self-hosted; moves data between devices) ---- */
function referencedImageIds(){
  const ids = new Set();
  state.inspo.forEach(i => i.imgId && ids.add(i.imgId));
  state.competitors.forEach(c => c.imgId && ids.add(c.imgId));
  state.videos.forEach(v => ['A','B','C'].forEach(k => v.thumbs[k] && ids.add(v.thumbs[k])));
  if (state.lab.source && state.lab.source.startsWith('up:')) ids.add(state.lab.source.slice(3));
  return [...ids];
}

async function callSorter(text){
  const existing = state.videos.map(v => ({ id: v.id, title: v.title, status: v.status }));
  const prompt = `You are the filing assistant inside a YouTube planner app for "Ryan Retro", a retro handheld gaming channel. The creator has written a messy brain dump. File every piece of it into the right place.

EXISTING VIDEO PLANNERS (match to these when the note clearly refers to one):
${JSON.stringify(existing)}

BRAIN DUMP:
"""${text}"""

Rules:
- If a note refers to an existing video (by device name, topic or title), file it under that video's id.
- If a note describes a NEW video idea, create a new video entry (videoId: null) with a clear working title.
- Sequential steps to perform, demonstrate, or say ON CAMERA (setup walkthroughs, demo sequences, guide steps, talking points) become filmingPoints, kept in their original order.
- Off-camera tasks (ordering, emailing, scripting, editing, uploading, research) become todos (short, actionable).
- Catchy title suggestions go into titleIdeas.
- Sponsor/collab/CTA mentions go into sponsorNotes for the relevant video.
- Free-floating thoughts that belong to a video go into notes (keep the creator's wording, lightly tidied).
- Anything that fits no video goes into general.
- Keep every note/todo/title under 18 words. Be terse.

Respond with ONLY minified single-line JSON (no markdown fences, no line breaks, no extra spaces), exactly this shape:
{"videos":[{"videoId":"existing-id-or-null","newTitle":"only if videoId is null","notes":["..."],"titleIdeas":["..."],"todos":["..."],"filmingPoints":["..."],"sponsorNotes":["..."]}],"general":{"notes":["..."],"todos":["..."]}}`;

  /* call, and auto-continue if the response got cut off mid-JSON */
  let raw = '';
  for (let i = 0; i < 4; i++){
    const messages = raw
      ? [{ role: 'user', content: prompt }, { role: 'assistant', content: raw }]
      : [{ role: 'user', content: prompt }];
    const headers = { 'Content-Type': 'application/json' };
    if (!isArtifact){
      let key = localStorage.getItem('anthropic_api_key');
      if (!key){
        key = window.prompt('Auto-Sort uses Claude. Paste your Anthropic API key (kept only in this browser, sent only to api.anthropic.com):');
        if (!key) throw new Error('Auto-Sort needs an API key when self-hosted');
        localStorage.setItem('anthropic_api_key', key.trim());
      }
      headers['x-api-key'] = key.trim();
      headers['anthropic-version'] = '2023-06-01';
      headers['anthropic-dangerous-direct-browser-access'] = 'true';
    }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers,
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages })
    });
    if (!isArtifact && (res.status === 401 || res.status === 403)){
      localStorage.removeItem('anthropic_api_key');
      throw new Error('API key rejected — it has been cleared, try again');
    }
    const data = await res.json();
    raw += (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    if (data.stop_reason !== 'max_tokens') break;   // complete — otherwise loop continues the JSON
  }
  raw = raw.replace(/```json|```/g, '').trim();
  try { return JSON.parse(raw); }
  catch(e){ return repairJSON(raw); }               // best-effort fix for any remaining truncation
}

/* Close any unterminated strings/brackets so a truncated response still parses */
function repairJSON(s){
  let stack = [], inStr = false, escp = false;
  for (const ch of s){
    if (escp){ escp = false; continue; }
    if (inStr){
      if (ch === '\\') escp = true;
      else if (ch === '"') inStr = false;
      continue;
    }
    if (ch === '"') inStr = true;
    else if (ch === '{') stack.push('}');
    else if (ch === '[') stack.push(']');
    else if (ch === '}' || ch === ']') stack.pop();
  }
  let fixed = s;
  if (inStr) fixed += '"';
  fixed = fixed.replace(/,\s*$/, '');
  if (/:\s*$/.test(fixed)) fixed += 'null';
  if (/"\s*$/.test(fixed) && !/[:,[{]\s*"[^"]*"\s*$/.test(fixed)) { /* dangling key is rare; let close-out handle it */ }
  while (stack.length) fixed += stack.pop();
  return JSON.parse(fixed);
}

const todoText = t => typeof t === 'string' ? t : (t && t.text) || '';

function showSortPreview(plan){
  const dots = { notes:'var(--blue)', titles:'var(--pop)', todos:'var(--green)', film:'var(--orange)', sponsor:'var(--pink)' };
  let html = '';
  (plan.videos || []).forEach(v => {
    const target = v.videoId ? state.videos.find(x => x.id === v.videoId) : null;
    const name = target ? target.title : (v.newTitle || 'New video');
    const isNew = !target;
    let items = '';
    (v.notes||[]).forEach(n => items += `<li><span class="dest-dot" style="background:${dots.notes}"></span> Note: ${esc(n)}</li>`);
    (v.titleIdeas||[]).forEach(n => items += `<li><span class="dest-dot" style="background:${dots.titles}"></span> Title idea: ${esc(n)}</li>`);
    (v.todos||[]).forEach(t => items += `<li><span class="dest-dot" style="background:${dots.todos}"></span> To-do: ${esc(todoText(t))}</li>`);
    (v.filmingPoints||[]).forEach(t => items += `<li><span class="dest-dot" style="background:${dots.film}"></span> Filming Mode: ${esc(todoText(t))}</li>`);
    (v.sponsorNotes||[]).forEach(n => items += `<li><span class="dest-dot" style="background:${dots.sponsor}"></span> Sponsor/CTA: ${esc(n)}</li>`);
    if (items) html += `<div class="file-card"><div class="dest">${esc(name)} ${isNew ? '<span style="background:#E4F5EB;color:#1E8E4E;border-radius:999px;font-size:10px;padding:3px 9px;font-weight:700;letter-spacing:.04em;">NEW PLANNER</span>' : ''}</div><ul>${items}</ul></div>`;
  });
  const g = plan.general || {};
  let gItems = '';
  (g.notes||[]).forEach(n => gItems += `<li><span class="dest-dot" style="background:${dots.notes}"></span> ${esc(n)}</li>`);
  (g.todos||[]).forEach(t => gItems += `<li><span class="dest-dot" style="background:${dots.todos}"></span> To-do: ${esc(todoText(t))}</li>`);
  if (gItems) html += `<div class="file-card"><div class="dest">General (stays in Brain Dump as a tidy list)</div><ul>${gItems}</ul></div>`;
  if (!html) html = '<div class="empty">Couldn\'t find anything to file — try adding a bit more detail.</div>';

}

$('#applySortBtn').addEventListener('click', () => {
  if (!pendingSort) return;
  let filed = 0;
  (pendingSort.videos || []).forEach(v => {
    let target = v.videoId ? state.videos.find(x => x.id === v.videoId) : null;
    if (!target){
      target = newVideo(v.newTitle || 'New video idea');
      target.status = 'Planning';
      state.videos.unshift(target);
    }
    (v.notes||[]).forEach(n => { target.notes = (target.notes ? target.notes + '\n\n' : '') + '• ' + n; filed++; });
    (v.titleIdeas||[]).forEach(t => { target.titleIdeas.push({ id: uid(), text: t, starred: false }); filed++; });
    (v.todos||[]).forEach(t => { target.todos.push({ id: uid(), text: todoText(t), done: false }); filed++; });
    (v.filmingPoints||[]).forEach(t => {
      if (!Array.isArray(target.say)) target.say = [];
      target.say.push({ id: uid(), text: todoText(t), done: false }); filed++;
    });
    (v.sponsorNotes||[]).forEach(n => { target.sponsor.points = (target.sponsor.points ? target.sponsor.points + '\n' : '') + '• ' + n; filed++; });
  });
  const g = pendingSort.general || {};
  const leftover = [];
  (g.notes||[]).forEach(n => leftover.push('• ' + n));
  (g.todos||[]).forEach(t => leftover.push('- ' + todoText(t)));
  state.history.unshift({ date: new Date().toLocaleString(), text: state.dump });
  state.history = state.history.slice(0, 8);
  state.dump = leftover.join('\n');
  dumpText.value = state.dump;

  pendingSort = null;
  save(); renderHistory(); renderVideos();

});

function videoProgress(v){
  if (!v.todos.length) return 0;

function renderVideos(){
  $('#videoDetail').style.display = 'none';

  const ordered = [...state.videos].sort((a,b) => (PHASE_RANK[a.status] ?? 3) - (PHASE_RANK[b.status] ?? 3));

function renderIdeas(v){
  const sorted = [...v.titleIdeas].sort((a,b) => (b.starred?1:0) - (a.starred?1:0));
  $('#ideaList').innerHTML = sorted.length ? sorted.map(i => `
    <div class="idea-li ${i.starred?'star':''}" data-id="${i.id}">
      <button class="icon-btn ${i.starred?'on':''}" data-act="star" title="Star to make this the title">${i.starred?'★':'☆'}</button>
      <textarea class="t" rows="1">${esc(i.text)}</textarea>
      <button class="icon-btn" data-act="del" title="Delete">✕</button>
    </div>`).join('')
    : '<div class="empty">No title ideas yet.</div>';
  growAll($('#ideaList'));

  $('#ideaList').onclick = e => {
    const b = e.target.closest('[data-act]'); if (!b) return;
    const row = e.target.closest('.idea-li');
    const idea = v.titleIdeas.find(x => x.id === row.dataset.id);
    if (b.dataset.act === 'star'){
      const was = idea.starred;
      v.titleIdeas.forEach(x => x.starred = false);
      idea.starred = !was;
      if (idea.starred){
        v.title = idea.text;
        const t = $('#vTitle');
        if (t){ t.value = idea.text; autoGrow(t); }
      }
      save(); renderIdeas(v);
    }
    if (b.dataset.act === 'del'){ v.titleIdeas = v.titleIdeas.filter(x => x.id !== idea.id); save(); renderIdeas(v); }
  };
  $('#ideaList').oninput = e => {
    if (!e.target.classList.contains('t')) return;
    const idea = v.titleIdeas.find(x => x.id === e.target.closest('.idea-li').dataset.id);
    if (idea){ idea.text = e.target.value; save(); }
  };
}

function renderTodos(v){
  const sorted = [...v.todos].sort((a,b) => (a.done?1:0)-(b.done?1:0));
  $('#todoList').innerHTML = sorted.map(t => `
    <div class="todo-li ${t.done?'done':''}" data-id="${t.id}">
      <input type="checkbox" ${t.done?'checked':''}>
      <textarea class="t" rows="1">${esc(t.text)}</textarea>
      <button class="icon-btn" data-act="del" title="Delete">✕</button>
    </div>`).join('') || '<div class="empty">No tasks yet. Auto-Sort a brain dump or add one above.</div>';
  growAll($('#todoList'));
  requestAnimationFrame(syncNotesHeight);

  $('#todoList').onclick = e => {
    const row = e.target.closest('.todo-li'); if (!row) return;
    const t = v.todos.find(x => x.id === row.dataset.id);
    if (e.target.type === 'checkbox'){ t.done = e.target.checked; save(); renderTodos(v); }
    if (e.target.dataset.act === 'del'){ v.todos = v.todos.filter(x => x.id !== t.id); save(); renderTodos(v); }
  };
  $('#todoList').oninput = e => {
    if (!e.target.classList.contains('t')) return;
    const t = v.todos.find(x => x.id === e.target.closest('.todo-li').dataset.id);
    if (t){ t.text = e.target.value; save(); }
  };
}

function renderThumbs(v){
  const comp = $('#thumbComp');
  comp.innerHTML = ['A','B','C'].map(k => {
    const imgId = v.thumbs[k];
    return `<div class="tslot ${v.winner===k && imgId ? 'win':''}" data-slot="${k}">
      <span class="label">${k}${v.winner===k && imgId ? ' · WINNER':''}</span>
      ${imgId
        ? `<img data-img-id="${imgId}" alt="Thumbnail ${k}" title="Click to replace">
           <div class="foot">
             <button data-act="win">${v.winner===k?'Winner':'Set winner'}</button>
             <button data-act="lab">Lab</button>
             <button data-act="del">Remove</button>
           </div>`
        : `<button class="ph" data-act="up"><span>Upload option ${k}</span></button>`}
    </div>`;
  }).join('');
  hydrateImages(comp);

  comp.onclick = async e => {
    const slot = e.target.closest('.tslot'); if (!slot) return;
    const k = slot.dataset.slot;
    const act = e.target.closest('[data-act]')?.dataset.act;
    if (act === 'up' || e.target.tagName === 'IMG'){
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = async () => {
        if (!inp.files[0]) return;
        if (v.thumbs[k]) deleteImage(v.thumbs[k]);
        v.thumbs[k] = await storeImage(inp.files[0]);
        if (!v.winner) v.winner = k;
        save(); renderThumbs(v);
      };
      inp.click();
    }
    if (act === 'win'){ v.winner = k; save(); renderThumbs(v); }
    if (act === 'del'){
      deleteImage(v.thumbs[k]); v.thumbs[k] = null;
      if (v.winner === k) v.winner = ['A','B','C'].find(x => v.thumbs[x]) || null;
      save(); renderThumbs(v);
    }
    if (act === 'lab'){
      state.lab.source = v.id + ':' + k; save();
      gotoTab('lab'); renderLab();
    }
  };
}

function ensureDescGlobals(){
  if (!state.descGlobals){
    state.descGlobals = { v: 2, store: 'https://www.ryanretro.com/store', editor: 'KeidenEdits',
      socials: DESC_SOCIALS_V2, devices: DESC_DEVICES_V2() };

  if (!G.v || G.v < 2){
    G.devices = DESC_DEVICES_V2();
    G.socials = DESC_SOCIALS_V2;
    G.v = 2;
    state.videos.forEach(x => { if (x.desc) x.desc.devices = []; });  // old ids no longer exist
  }
}
function ensureDesc(v){
  if (!v.desc) v.desc = { intro:'Hello everyone, in this video we ', devices:[], extras:[], sponsorOn:false, sponsorText:'', sponsorTouched:false, editorOn:false, timestampsOn:true, timestamps:'', outro:0 };
  if (v.desc.outro == null) v.desc.outro = 0;
  if (v.desc.timestamps == null) v.desc.timestamps = '';
  if (!v.desc.intro) v.desc.intro = 'Hello everyone, in this video we ';
  /* auto-set the sponsor section from the Sponsor card, until the user touches the toggle */
  if (v.sponsor && v.sponsor.name && !v.desc.sponsorTouched && !v.desc.sponsorOn && !v.desc.sponsorText.trim()){
    v.desc.sponsorOn = true;
    v.desc.sponsorText = descSponsorTemplate(v);
  }
}
function descSponsorTemplate(v){
  const name = (v.sponsor && v.sponsor.name) || 'SPONSOR';
  return 'This video is sponsored by ' + name + '! Check them out here: LINK';
}

const DESC_DIV = '━'.repeat(25);

function buildDescription(v){
  ensureDescGlobals(); ensureDesc(v);
  const G = state.descGlobals, d = v.desc;
  const parts = [];
  if (d.intro.trim()) parts.push(d.intro.trim());

  const devs = d.devices.map(id => G.devices.find(x => x.id === id)).filter(Boolean);
  const linkLines = dv => (dv.link || '').split('\n').map(l => l.trim()).filter(Boolean);
  const shop = [];
  if (devs.length){
    const names = devs.map(x => x.name);
    const joined = names.length === 1 ? names[0]
      : names.length === 2 ? `${names[0]} or ${names[1]}`
      : `${names.slice(0, -1).join(', ')}, or ${names[names.length - 1]}`;
    const many = devs.length > 1 || linkLines(devs[0]).length > 1;
    shop.push(`🎮 If you’d like to buy your own ${joined}, you can use my affiliate link${many ? 's' : ''} below — it supports the channel at no extra cost to you:`);
    if (devs.length === 1){
      linkLines(devs[0]).forEach(l => shop.push(l));
    } else {
      devs.forEach(dv => {
        const lines = linkLines(dv);
        if (lines.length <= 1) shop.push(`🕹️ ${dv.name} — ${lines[0] || ''}`);
        else { shop.push(`🕹️ ${dv.name}`); lines.forEach(l => shop.push('    ' + l)); }
      });
    }
    shop.push('');
  }
  shop.push(`🛒 All my affiliate links: ${G.store}`);
  parts.push(shop.join('\n'));

  if (d.sponsorOn && d.sponsorText.trim()) parts.push('🤝 ' + d.sponsorText.trim());

  const extras = (d.extras || []).filter(x => (x.label || '').trim() || (x.url || '').trim());
  if (extras.length) parts.push(extras.map(x => `${(x.label || '').trim()}: ${(x.url || '').trim()}`).join('\n'));

  parts.push('🔗 Let’s stay connected — come say hi:\n' + G.socials);
  if (d.editorOn) parts.push(`🎨 Edited by ${G.editor}`);
  if (d.timestampsOn) parts.push('⏰ Timestamps:\n' + (d.timestamps.trim() || '0:00 Intro'));
  if (d.outro >= 0 && DESC_OUTROS[d.outro]) parts.push(DESC_OUTROS[d.outro]);

  return parts.join('\n' + DESC_DIV + '\n');
}

function renderFilmBody(){
  const body = $('#filmBody');
  const v = state.videos.find(x => x.id === state.filmSel);
  if (!v){ body.innerHTML = '<div class="empty">Pick a video above and your talking points appear here.</div>'; return; }

  if (!Array.isArray(v.say)) v.say = [];
  const pts = v.say.filter(p => p.type !== 'sec');
  const total = pts.length;
  const done = pts.filter(p => p.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const sponsorBits = [v.sponsor.name && ('Sponsor: ' + v.sponsor.name), v.sponsor.points, v.sponsor.ctas].filter(Boolean).join('\n');

  body.innerHTML = `
    <div class="sticky-prog" style="margin-top:14px;">
      <span>${done}/${total} done</span>
      <div class="bar" style="flex:1; background:#fff;"><i style="width:${pct}%"></i></div>
      <button class="btn ghost" id="lockX">${state.filmLockX ? 'Show ✕' : 'Hide ✕'}</button>
      <button class="btn ghost" id="resetSay">Reset</button>
    </div>
    ${sponsorBits ? `<div class="sponsor-flag"><b>Don't forget on camera:</b><br><span style="white-space:pre-wrap;">${esc(sponsorBits)}</span></div>` : ''}
    <div class="film-check" style="margin-top:16px;">
      ${v.say.map(p => p.type === 'sec' ? `
        <div class="fitem fdiv secc-${p.color || 'teal'}" data-say="${p.id}">
          <textarea rows="1" class="secname" placeholder="Section" title="Double-click the band to change colour">${esc(p.text)}</textarea>
          ${state.filmLockX ? '' : '<button class="icon-btn" data-act="del" title="Delete">✕</button>'}
        </div>` : `
        <div class="fitem ${p.done?'done':''}" data-say="${p.id}">
          <input type="checkbox" ${p.done?'checked':''}>
          <textarea rows="1" placeholder="">${esc(p.text)}</textarea>
          ${state.filmLockX ? '' : '<button class="icon-btn" data-act="del" title="Delete">✕</button>'}
        </div>`).join('')}
      ${v.say.length ? '' : '<div class="empty">Add the points you want to say, in the order your video flows.</div>'}
    </div>
    <div class="fadd" style="margin-top:12px;">
      <input id="sayAddInput" placeholder='Add a point' enterkeyhint="done">
      <button class="btn pop" data-act="add">+ Add</button>
      <button class="btn" data-act="addsec" title="Add a section divider">+ Section</button>
    </div>`;

  growAll(body);
  wireSayReorder(body, v);

  const addPoint = () => {
    const inp = $('#sayAddInput');
    const t = inp.value.trim(); if (!t) return;
    v.say.push({ id: uid(), text: t, done: false });
    save(); renderFilmBody();
    const ni = $('#sayAddInput');
    if (ni) ni.focus();
  };

  const SECC = ['teal','blue','green','purple','amber','rose'];
  body.onclick = e => {
    if (e.target.closest('[data-act="add"]')){ addPoint(); return; }
    if (e.target.closest('[data-act="addsec"]')){
      const inp = $('#sayAddInput');
      const name = inp.value.trim();
      const used = v.say.filter(p => p.type === 'sec').length;
      v.say.push({ id: uid(), type: 'sec', text: name || 'Section', color: SECC[used % SECC.length] });
      if (name) inp.value = '';
      save(); renderFilmBody();
      const rows = body.querySelectorAll('.fdiv .secname');
      const last = rows[rows.length - 1];
      if (last && !name){ last.focus(); last.select(); }
      return;
    }

    const del = e.target.closest('[data-act="del"]');
    if (del){
      const id = del.closest('.fitem').dataset.say;
      v.say = v.say.filter(p => p.id !== id);
      save(); renderFilmBody(); return;
    }
    if (e.target.type === 'checkbox'){
      const row = e.target.closest('.fitem');
      if (row && row.dataset.say){
        const p = v.say.find(x => x.id === row.dataset.say);
        if (p){ p.done = e.target.checked; save(); renderFilmBody(); }
      }
    }
  };
  body.oninput = e => {
    if (e.target.tagName !== 'TEXTAREA') return;
    const row = e.target.closest('.fitem');
    if (row && row.dataset.say){
      const p = v.say.find(x => x.id === row.dataset.say);
      if (p){ p.text = e.target.value; save(); }
    }
  };
  body.onkeydown = e => {
    if (e.key === 'Enter' && e.target.id === 'sayAddInput'){ e.preventDefault(); addPoint(); }
  };
  body.ondblclick = e => {
    const div = e.target.closest('.fdiv');
    if (!div) return;
    const p = v.say.find(x => x.id === div.dataset.say);
    if (p){ p.color = SECC[(SECC.indexOf(p.color || 'teal') + 1) % SECC.length]; save(); renderFilmBody(); }
  };
  $('#lockX').onclick = () => { state.filmLockX = !state.filmLockX; save(); renderFilmBody(); };
  $('#resetSay').onclick = () => { v.say.forEach(p => { if (p.type !== 'sec') p.done = false; }); save(); renderFilmBody(); };
}

/* Drag rows to reorder talking points — grab anywhere on a row that isn't
   the checkbox, the text, or a button. No handles, just a grab cursor. */
function wireSayReorder(body, v){
  const list = body.querySelector('.film-check');
  if (!list) return;
  list.querySelectorAll('.fitem[data-say]').forEach(row => {
    row.addEventListener('mousedown', e => {
      if (e.target.closest('input, textarea, button')) return;
      row.draggable = true;
    });
    row.addEventListener('dragstart', e => {
      if (!row.draggable){ e.preventDefault(); return; }
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      row.draggable = false;
      const order = [...list.querySelectorAll('.fitem[data-say]')].map(el => el.dataset.say);
      v.say.sort((a,b) => order.indexOf(a.id) - order.indexOf(b.id));
      save();
    });
  });
  if (!list._dnd){
    list._dnd = true;
    list.addEventListener('dragover', e => {
      const dragging = list.querySelector('.fitem.dragging');
      if (!dragging) return;
      e.preventDefault();
      const rows = [...list.querySelectorAll('.fitem[data-say]:not(.dragging)')];
      const after = rows.find(r => e.clientY < r.getBoundingClientRect().top + r.offsetHeight / 2);
      if (after) list.insertBefore(dragging, after);
      else list.appendChild(dragging);
    });
  }
  document.addEventListener('mouseup', () => {
    list.querySelectorAll('.fitem').forEach(r => { if (!r.classList.contains('dragging')) r.draggable = false; });
  }, { once: true });
}

  /* resolve my thumbnail image id */
  let myImgId = null;
  if (state.lab.source){
    if (state.lab.source.startsWith('up:')) myImgId = state.lab.source.slice(3);
    else {
      const [vid, k] = state.lab.source.split(':');
      const v = state.videos.find(x => x.id === vid);
      myImgId = v && v.thumbs[k];
    }
  }

  const grid = $('#ytGrid');
  grid.className = 'yt ' + state.lab.size + (state.lab.highlight ? '' : ' hidemine');
  $('#revealBtn').textContent = state.lab.highlight ? 'Highlight mine: ON' : 'Highlight mine: OFF';
  $$('#sizeSeg button').forEach(b => b.classList.toggle('on', b.dataset.size === state.lab.size));

  if (!state.competitors.length && !myImgId){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">Drag your competitor thumbnail images here (or use Add) — they save permanently. Then pick one of yours and see if it wins the scroll.</div>';
    return;
  }

  /* build cards: competitors + mine, with stable shuffle order */
  const cards = state.competitors.map((c,i) => ({ key:'c'+c.id, imgId:c.imgId, mine:false, comp:c.id, meta: FAKE_META[i % FAKE_META.length] }));
  if (myImgId){
    const myV = state.lab.source.startsWith('up:') ? null : state.videos.find(x => x.id === state.lab.source.split(':')[0]);
    cards.push({ key:'me', imgId: myImgId, mine:true, meta:[ 'Ryan Retro', 'Just now', '16:20' ], title: myV ? myV.title : 'Your thumbnail' });
  }
  if (!state.lab.order || state.lab.order.length !== cards.length){
    state.lab.order = cards.map(c => c.key).sort(() => Math.random() - .5);
  }
  cards.sort((a,b) => state.lab.order.indexOf(a.key) - state.lab.order.indexOf(b.key));

  grid.innerHTML = cards.map(c => `
    <div class="ytc ${c.mine?'mine':''}">
      <div class="tn">
        ${c.comp ? `<button class="rm" data-comp="${c.comp}" title="Remove">×</button>` : ''}
        <img data-img-id="${c.imgId}" alt="">
        <span class="dur">${c.meta[2]}</span>
      </div>
      <div class="info">
        <div class="av">${c.mine ? 'R' : esc(c.meta[0][0])}</div>
        <div>
          <div class="tt">${esc(c.mine ? (c.title || 'Your video') : 'Competitor upload — does yours beat this?')}</div>
          <div class="ch">${esc(c.meta[0])} · ${esc(c.meta[1])}</div>
        </div>
      </div>
    </div>`).join('');
  hydrateImages(grid);

  grid.onclick = e => {
    const rm = e.target.closest('.rm'); if (!rm) return;
    const comp = state.competitors.find(c => c.id === rm.dataset.comp);
    if (comp && comp.imgId) deleteImage(comp.imgId);
    state.competitors = state.competitors.filter(c => c.id !== rm.dataset.comp);
    state.lab.order = null; save(); renderLab();
  };
}

$('#sizeSeg').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state.lab.size = b.dataset.size; save(); renderLab();
});
$('#shuffleBtn').addEventListener('click', () => { state.lab.order = null; save(); renderLab(); });
$('#revealBtn').addEventListener('click', () => { state.lab.highlight = !state.lab.highlight; save(); renderLab(); });
$('#compUploadBtn').addEventListener('click', () => $('#compFile').click());
$('#compFile').addEventListener('change', () => {
  uploadCompetitors([...$('#compFile').files]);
  $('#compFile').value = '';
});

async function uploadCompetitors(files){
  files = files.filter(f => f.type.startsWith('image/') || /\.(jpe?g|png|webp|gif)$/i.test(f.name));
  const status = $('#labStatus');
  if (!files.length){ status.textContent = 'No image files detected in that selection.'; return; }
  let ok = 0; const errors = [];
  for (let i = 0; i < files.length; i++){
    status.textContent = `Uploading ${i+1}/${files.length}…`;
    try {
      const imgId = await storeImage(files[i]);
      state.competitors.push({ id: uid(), imgId });
      ok++;
      state.lab.order = null;
      save(); renderLab();           // show progress live, keep partial progress safe
    } catch(e){
      console.error('Upload failed for', files[i].name, e);
      errors.push(files[i].name + ': ' + e.message);
    }
  }
  status.textContent = errors.length
    ? `Added ${ok} of ${files.length} — failed: ${errors[0]}${errors.length > 1 ? ` (+${errors.length-1} more)` : ''}`
    : `Added ${ok} thumbnail${ok===1?'':'s'} ✔`;
  if (errors.length) toast(errors.length + ' upload' + (errors.length>1?'s':'') + ' failed — details next to the Add button');
}
$('#labUploadBtn').addEventListener('click', () => $('#labFile').click());
$('#labFile').addEventListener('change', async () => {
  const f = $('#labFile').files[0]; if (!f) return;
  const imgId = await storeImage(f);
  state.lab.source = 'up:' + imgId; state.lab.order = null;
  $('#labFile').value = ''; save(); renderLab();
});

/* drag & drop competitor thumbs anywhere on the lab grid */
const labView = $('#view-lab');
labView.addEventListener('dragover', e => { e.preventDefault(); $('#ytGrid').style.outline = '2px dashed var(--brand)'; });
labView.addEventListener('dragleave', () => { $('#ytGrid').style.outline = ''; });
labView.addEventListener('drop', e => {
  e.preventDefault(); $('#ytGrid').style.outline = '';
  uploadCompetitors([...e.dataTransfer.files]);
});

/* =================================================================
   INIT
   ================================================================= */
(async function init(){
  await loadState();
  /* storage health check — uses the retry queue, warns only if it truly can't save */
  setWithRetry('ping', '1').then(ok => {
    if (!ok) toast('Storage is unreachable right now — changes won\'t persist. Try reloading in a minute.');
  });
  if (!state.theme) state.theme = (matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  applyTheme();
  if (!isArtifact){
    const sb = $('#syncBtn');
    sb.style.display = '';
    sb.textContent = syncToken() ? 'Sync ✓' : 'Sync';
    sb.onclick = async () => { await setupSync(); sb.textContent = syncToken() ? 'Sync ✓' : 'Sync'; };
    setInterval(pullRemote, 10000);                                   // catch idle-tab changes
    document.addEventListener('visibilitychange', () => { if (!document.hidden) pullRemote(); });
    window.addEventListener('focus', pullRemote);                     // refresh the instant you return to this device
    window.addEventListener('online', pullRemote);
  }
  dumpText.value = state.dump || '';
  autoGrow(dumpText);
  $('#dumpCount').textContent = state.dump && state.dump.trim() ? state.dump.trim().split(/\s+/).length + ' words' : '';
  renderInspo(); renderHistory(); renderVideos(); renderFilm();
})();
</script>
