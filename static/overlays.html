<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan Retro | Video Overlay Batch Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#B9B2DE',
                            main: '#6254A4',
                            dark: '#463884',
                            accent: '#FFFFFF',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #463884; border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #B9B2DE; border-radius: 6px; border: 1px solid #463884; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #FFFFFF; }

        .brand-input {
            background: #6254A4;
            border: 2px solid #463884;
            color: #FFFFFF;
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: 700;
            padding: 0.75rem 1rem;
            width: 100%;
        }
        .brand-input:focus {
            outline: none;
            border-color: #FFFFFF;
            box-shadow: 3px 3px 0px #463884;
            transform: translateY(-2px);
        }
        .brand-input::placeholder { color: #B9B2DE; opacity: 0.7; }
        .brand-label {
            display: block;
            font-weight: 900;
            text-transform: uppercase;
            color: #463884;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

        .btn-chunky {
            background: #463884;
            color: #FFFFFF;
            border: 2px solid #463884;
            font-weight: 900;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            box-shadow: 4px 4px 0px rgba(70, 56, 132, 0.4);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-chunky:hover {
            background: #FFFFFF;
            color: #463884;
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(70, 56, 132, 0.6);
        }

        .bg-checkerboard {
            background-color: #f0f0f0;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0),
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .export-wrapper {
            padding: 40px;
            display: inline-block;
        }

        /* --- DYNAMIC THEME CLASSES (Bound to CSS Vars on the wrapper) --- */
        .th-bg-main { background-color: var(--t-main); }
        .th-bg-dark { background-color: var(--t-dark); }
        .th-bg-light { background-color: var(--t-light); }
        .th-border-main { border-color: var(--t-main); }
        .th-border-dark { border-color: var(--t-dark); }
        .th-border-light { border-color: var(--t-light); }
        .th-text-main { color: var(--t-main); }
        .th-text-dark { color: var(--t-dark); }
        .th-text-light { color: var(--t-light); }
        .th-text-on-main { color: var(--t-text-main); }
        .th-text-on-dark { color: var(--t-text-dark); }
        .th-shadow { box-shadow: 4px 4px 0px var(--t-dark); }
        .th-shadow-sm { box-shadow: 2px 2px 0px var(--t-dark); }
        .th-shadow-md { box-shadow: 3px 3px 0px var(--t-dark); }
        
        .theme-btn.active {
            border-color: #FFFFFF;
            box-shadow: 0 0 0 3px #463884;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-brand-light text-brand-dark font-sans antialiased min-h-screen flex flex-col relative">

    <!-- DROP ZONE OVERLAY -->
    <div id="drop-zone" class="fixed inset-0 bg-brand-main/95 z-[100] hidden flex-col items-center justify-center border-8 border-dashed border-white text-white pointer-events-none transition-all duration-300">
        <div class="bg-white/20 p-8 rounded-full mb-6 shadow-2xl animate-bounce">
            <i data-lucide="image-plus" class="w-24 h-24"></i>
        </div>
        <h2 class="text-4xl font-black uppercase tracking-tight text-center drop-shadow-md">Drop Box Arts Here</h2>
        <p class="text-xl font-bold opacity-80 mt-4 text-center">Batch generates an overlay editor for each image</p>
    </div>

    <header class="sticky top-0 z-50 bg-brand-main border-b-2 border-brand-dark shadow-md">
        <div class="container mx-auto px-4 lg:px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl overflow-hidden border-2 border-brand-dark shadow-[1px_1px_0px_#463884] bg-brand-light">
                    <img src="https://raw.githubusercontent.com/IRyzoI/ryanretro/refs/heads/main/images/ryanretrologo.jpg" class="w-full h-full object-cover">
                </div>
                <span class="font-black text-2xl tracking-tight hidden sm:block text-white uppercase">BATCH OVERLAYS</span>
            </div>
            <div class="flex items-center gap-4 text-white text-sm font-bold">
                <div id="sync-status" class="flex items-center gap-1 opacity-70"><i data-lucide="cloud" class="w-4 h-4"></i> Connecting...</div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow flex flex-col">
        <!-- HIDDEN DATALISTS FOR HISTORY -->
        <datalist id="title-history"></datalist>
        <datalist id="platform-presets">
            <option value="GameNative | PC"></option>
            <option value="Eden | Switch"></option>
            <option value="Dolphin | Gamecube"></option>
            <option value="NetherSX2 | PS2"></option>
            <option value="Flycast | Dreamcast"></option>
        </datalist>
        <div class="hidden">
            <select id="url-history-select"></select>
        </div>

        <div id="instances-container" class="space-y-16">
            <!-- Instances injected here via JS -->
        </div>

        <div class="mt-12 text-center pb-20">
            <button id="add-instance-btn" class="btn-chunky py-4 px-8 text-lg bg-white text-brand-dark shadow-[4px_4px_0px_rgba(70,56,132,0.2)] border-2 border-brand-dark hover:bg-brand-main hover:text-white">
                <i data-lucide="plus-circle" class="w-6 h-6"></i> Add Blank Game
            </button>
            <p class="mt-4 text-brand-dark/60 font-bold text-sm uppercase">Or Drag & Drop multiple images anywhere on the screen</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();

        // --- THEMES ---
        const THEMES = {
            purple: { main: '#6254A4', dark: '#463884', light: '#B9B2DE' },
            red:    { main: '#E60012', dark: '#A6000D', light: '#FFB3B8' },
            green:  { main: '#107C10', dark: '#0B5A0B', light: '#9BF09B' },
            blue:   { main: '#00A4EF', dark: '#005A9E', light: '#C7E0F4' },
            yellow: { main: '#FDD759', dark: '#C6A220', light: '#FEF0BB' },
            black:  { main: '#2A2A2A', dark: '#111111', light: '#AAAAAA' }
        };

        function adjustColor(color, amount) {
            return '#' + color.replace(/^#/, '').match(/.{2}/g).map(c => 
                Math.max(0, Math.min(255, parseInt(c, 16) + amount)).toString(16).padStart(2, '0')
            ).join('');
        }

        function getTheme(key) {
            if (THEMES[key]) return THEMES[key];
            if (key && key.startsWith('#')) {
                return {
                    main: key,
                    dark: adjustColor(key, -40),
                    light: adjustColor(key, 80)
                };
            }
            return THEMES.purple;
        }

        function getContrastColor(hex) {
            if (!hex) return '#FFFFFF';
            const rgb = hex.replace(/^#/, '').match(/.{2}/g);
            if(!rgb || rgb.length !== 3) return '#FFFFFF';
            const r = parseInt(rgb[0], 16), g = parseInt(rgb[1], 16), b = parseInt(rgb[2], 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.55 ? '#111111' : '#FFFFFF';
        }

        // --- APP STATE ---
        let instances = [];
        let globalTitleHistory = [];
        let globalUrlHistory = [];
        let isStateLoaded = false;
        
        const container = document.getElementById('instances-container');
        const syncStatus = document.getElementById('sync-status');

        function createDefaultInstance() {
            return {
                id: crypto.randomUUID(),
                title: "God of War II",
                platform: "NetherSX2 | PS2",
                settings: "Resolution: 1280 x 720\nDriver: Turnip 26.0.0 R8",
                fps: "60", temp: "42°C", tdp: "12.5W",
                url: "", localImage: null, theme: "purple"
            };
        }

        // --- FIREBASE SETUP ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ryan-retro-overlays-batch';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                syncStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4 text-red-400"></i> Offline`;
                lucide.createIcons();
                isStateLoaded = true;
                if(instances.length === 0) { instances.push(createDefaultInstance()); }
                renderInstances();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                syncStatus.innerHTML = `<i data-lucide="cloud-lightning" class="w-4 h-4 text-green-400"></i> Cloud Synced`;
                lucide.createIcons();
                loadCloudState();
                listenToCloudHistory();
            }
        });

        initAuth();

        // --- STATE AUTOSAVE ---
        let saveTimeout;
        window.debouncedSaveState = function() {
            if (!isStateLoaded) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveCurrentState, 500);
        }

        async function saveCurrentState() {
            if (!currentUser || !isStateLoaded) return;
            // Strip out localImage (Base64) to prevent huge Firestore documents
            const stateToSave = instances.map(({ localImage, ...rest }) => rest);
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'batch_state');
            try {
                await setDoc(docRef, { instances: stateToSave });
            } catch (e) { console.error("Auto-save failed", e); }
        }

        async function loadCloudState() {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'batch_state');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().instances) {
                    instances = docSnap.data().instances;
                } else {
                    // Try to migrate old v1 state
                    const oldRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'current_state');
                    const oldSnap = await getDoc(oldRef);
                    if(oldSnap.exists()) {
                        instances = [{ id: crypto.randomUUID(), ...oldSnap.data(), theme: 'purple' }];
                    } else {
                        instances = [createDefaultInstance()];
                    }
                }

                // If any instance has a URL but no local image, we fetch it silently
                instances.forEach((inst, index) => {
                    if (inst.url && !inst.localImage) {
                        fetchImageQuietly(inst.url, inst.id);
                    }
                });

            } catch (e) { 
                console.error("Failed to load state", e);
                if(instances.length === 0) instances = [createDefaultInstance()];
            } finally {
                isStateLoaded = true;
                renderInstances();
            }
        }

        async function fetchImageQuietly(url, instanceId) {
            try {
                const base64data = await getBase64ImageFromUrl(url);
                const inst = instances.find(i => i.id === instanceId);
                if (inst) {
                    inst.localImage = base64data;
                    updateInstancePreviews(document.querySelector(`[data-id="${instanceId}"]`), inst);
                }
            } catch (e) { console.warn("Silent fetch failed for", url); }
        }

        // --- HISTORY ---
        function listenToCloudHistory() {
            if (!currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'history');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    globalTitleHistory = docSnap.data().titles || [];
                    globalUrlHistory = docSnap.data().urls || [];
                }
                renderTitleHistory();
            }, (err) => console.error("History sync error:", err));
        }

        async function updateCloudHistory() {
            if (!currentUser || !isStateLoaded) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'history');
            try { await setDoc(docRef, { titles: globalTitleHistory, urls: globalUrlHistory }, { merge: true }); } 
            catch(e) { console.error("History error", e); }
        }

        function renderTitleHistory() {
            const list = document.getElementById('title-history');
            list.innerHTML = '';
            globalTitleHistory.forEach(title => {
                const option = document.createElement('option');
                option.value = title;
                list.appendChild(option);
            });
        }

        window.saveTitleToHistory = function(title) {
            title = title.trim();
            if (!title || !isStateLoaded) return;
            if (!globalTitleHistory.includes(title)) {
                globalTitleHistory.unshift(title);
                if (globalTitleHistory.length > 20) globalTitleHistory.pop();
                updateCloudHistory();
            }
        }

        // --- UI RENDERING (BATCH MODE) ---
        function renderInstances() {
            container.innerHTML = '';
            if(instances.length === 0) return;
            instances.forEach((inst, index) => {
                container.insertAdjacentHTML('beforeend', createInstanceHTML(inst, index));
                updateInstancePreviews(container.lastElementChild, inst);
            });
            lucide.createIcons();
        }

        function createInstanceHTML(inst, index) {
            const imgSrc = inst.localImage || "https://placehold.co/200x300/463884/FFF?text=IMG";
            const theme = getTheme(inst.theme);

            return `
            <div class="instance-wrapper flex flex-col lg:flex-row gap-8 bg-brand-light/10 border-4 border-brand-dark/20 rounded-3xl p-6 relative" data-id="${inst.id}">
                
                <!-- Remove Button -->
                <button class="action-delete absolute -top-4 -right-4 bg-brand-dark hover:bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-[4px_4px_0px_#463884] hover:shadow-none hover:translate-y-[4px] hover:translate-x-[4px] transition-all z-10" title="Remove Game">
                    <i data-lucide="x" class="w-5 h-5 pointer-events-none"></i>
                </button>

                <!-- CONTROLS SIDEBAR -->
                <aside class="w-full lg:w-1/3 space-y-6">
                    <div class="bg-white border-2 border-brand-dark rounded-2xl p-6 shadow-[4px_4px_0px_#463884]">
                        
                        <div class="flex flex-wrap justify-between items-center gap-4 mb-6 border-b-2 border-brand-light pb-3">
                            <h2 class="font-black text-xl text-brand-dark uppercase tracking-tight whitespace-nowrap">Game #${index + 1}</h2>
                            <div class="flex flex-wrap gap-2 theme-selector items-center">
                                ${Object.keys(THEMES).map(tKey => `
                                    <button class="theme-btn w-6 h-6 rounded-full border-2 border-brand-dark cursor-pointer transition-transform shrink-0 ${inst.theme === tKey ? 'active' : 'hover:scale-110'}" data-theme="${tKey}" style="background: ${THEMES[tKey].main};" title="Theme: ${tKey}"></button>
                                `).join('')}
                                <div class="w-px h-6 bg-brand-dark/20 mx-1 shrink-0"></div>
                                <label class="relative w-6 h-6 rounded-full border-2 border-brand-dark cursor-pointer transition-transform flex items-center justify-center overflow-hidden shrink-0 ${(inst.theme && inst.theme.startsWith('#')) ? 'active scale-110' : 'hover:scale-110'}" title="Custom Color" style="${(inst.theme && inst.theme.startsWith('#')) ? `background: ${inst.theme};` : 'background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);'}">
                                    <input type="color" class="custom-color-input opacity-0 absolute inset-0 w-full h-full cursor-pointer" value="${(inst.theme && inst.theme.startsWith('#')) ? inst.theme : '#ffffff'}">
                                </label>
                            </div>
                        </div>
                        
                        <!-- Game Info -->
                        <div class="space-y-4 mb-6">
                            <div class="bg-brand-light/30 p-4 rounded-xl border border-brand-dark">
                                <label class="brand-label">Game Title</label>
                                <input type="text" list="title-history" class="brand-input mb-3 input-title" value="${escapeHtml(inst.title)}" autocomplete="off">
                                
                                <label class="brand-label">Platform / Emulator</label>
                                <input type="text" list="platform-presets" class="brand-input mb-3 input-platform" value="${escapeHtml(inst.platform)}" autocomplete="off">
                                
                                <label class="brand-label mt-4">Box Art (Drag onto screen or browse)</label>
                                <input type="file" accept="image/*" class="brand-input text-sm input-image file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-black file:bg-brand-dark file:text-white hover:file:bg-white hover:file:text-brand-dark cursor-pointer p-2">
                                
                                <label class="brand-label mt-4">Box Art (URL)</label>
                                <div class="flex gap-2">
                                    <input type="url" class="brand-input mb-0 input-url" placeholder="https://..." value="${escapeHtml(inst.url)}" autocomplete="off">
                                    <button class="action-load-url bg-brand-dark hover:bg-white text-white hover:text-brand-dark border-2 border-brand-dark rounded-xl px-3 transition-colors shadow-[2px_2px_0px_#463884] hover:translate-y-[2px] hover:shadow-none">
                                        <i data-lucide="download-cloud" class="w-5 h-5 pointer-events-none"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Settings -->
                            <div class="bg-brand-light/30 p-4 rounded-xl border border-brand-dark">
                                <label class="brand-label">Settings (Key: Value)</label>
                                <textarea class="brand-input h-24 input-settings">${escapeHtml(inst.settings)}</textarea>
                            </div>

                            <!-- Thermals -->
                            <div class="bg-brand-light/30 p-4 rounded-xl border border-brand-dark grid grid-cols-2 gap-3">
                                <div>
                                    <label class="brand-label">FPS</label>
                                    <input type="text" class="brand-input input-fps" value="${escapeHtml(inst.fps)}">
                                </div>
                                <div>
                                    <label class="brand-label">Temp</label>
                                    <input type="text" class="brand-input input-temp" value="${escapeHtml(inst.temp)}">
                                </div>
                                <div class="col-span-2">
                                    <label class="brand-label">Power (TDP)</label>
                                    <input type="text" class="brand-input input-tdp" value="${escapeHtml(inst.tdp)}">
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- PREVIEW AREA -->
                <section class="w-full lg:w-2/3 grid grid-cols-1 xl:grid-cols-2 gap-4">
                    
                    <!-- 1. Game Badge -->
                    <div class="bg-brand-main border-2 border-brand-dark rounded-2xl p-4 shadow-[4px_4px_0px_#463884] flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-white text-sm">1. Game Badge</h3>
                            <button class="action-dl btn-chunky py-1.5 px-3 text-xs" data-target="export-game-${inst.id}"><i data-lucide="download" class="w-3 h-3 pointer-events-none"></i> PNG</button>
                        </div>
                        <div class="bg-checkerboard rounded-xl border-2 border-brand-dark overflow-auto custom-scrollbar flex items-center justify-center flex-grow p-4 min-h-[160px]">
                            
                            <!-- EXPORT TARGET -->
                            <div id="export-game-${inst.id}" class="export-wrapper" style="--t-main: ${theme.main}; --t-dark: ${theme.dark}; --t-light: ${theme.light}; --t-text-main: ${getContrastColor(theme.main)}; --t-text-dark: ${getContrastColor(theme.dark)};">
                                <div class="th-bg-main th-border-dark border rounded-2xl p-4 th-shadow flex items-center gap-5 w-max">
                                    <div class="h-32 min-w-[85px] max-w-[200px] flex justify-center items-center bg-[#FFFFFF] rounded-xl overflow-hidden border border-[#FFFFFF] shrink-0 shadow-inner flex-shrink-0">
                                        <img src="${imgSrc}" class="render-art h-full w-auto max-w-none block transform scale-105 origin-center object-cover">
                                    </div>
                                    <div class="flex flex-col justify-center pr-4">
                                        <span class="bg-[#FFFFFF] th-text-dark font-black uppercase tracking-widest text-lg px-3 py-1 rounded-lg w-max mb-2 th-border-dark border th-shadow-sm render-platform whitespace-nowrap">System</span>
                                        <h1 class="font-black th-text-on-main text-2xl uppercase tracking-tight leading-tight max-w-sm render-title line-clamp-2">Game Title</h1>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 2. Settings Panel -->
                    <div class="bg-brand-main border-2 border-brand-dark rounded-2xl p-4 shadow-[4px_4px_0px_#463884] flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-white text-sm">2. Settings Panel</h3>
                            <button class="action-dl btn-chunky py-1.5 px-3 text-xs" data-target="export-settings-${inst.id}"><i data-lucide="download" class="w-3 h-3 pointer-events-none"></i> PNG</button>
                        </div>
                        <div class="bg-checkerboard rounded-xl border-2 border-brand-dark overflow-auto custom-scrollbar flex items-center justify-center flex-grow p-4 min-h-[160px]">
                            
                            <!-- EXPORT TARGET -->
                            <div id="export-settings-${inst.id}" class="export-wrapper" style="--t-main: ${theme.main}; --t-dark: ${theme.dark}; --t-light: ${theme.light}; --t-text-main: ${getContrastColor(theme.main)}; --t-text-dark: ${getContrastColor(theme.dark)};">
                                <div class="th-bg-dark border border-[#FFFFFF] rounded-2xl p-5 shadow-[4px_4px_0px_rgba(0,0,0,0.3)] w-max min-w-[280px]">
                                    <h3 class="font-black th-text-light uppercase tracking-widest text-xs mb-3 border-b pb-2 flex items-center" style="border-color: var(--t-light);"><i data-lucide="settings" class="inline w-3 h-3 mr-1"></i> Applied Settings</h3>
                                    <div class="render-settings flex flex-col gap-2"></div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 3. Thermals & Power -->
                    <div class="bg-brand-main border-2 border-brand-dark rounded-2xl p-4 shadow-[4px_4px_0px_#463884] flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-white text-sm">3. Thermals & Power</h3>
                            <button class="action-dl btn-chunky py-1.5 px-3 text-xs" data-target="export-thermals-${inst.id}"><i data-lucide="download" class="w-3 h-3 pointer-events-none"></i> PNG</button>
                        </div>
                        <div class="bg-checkerboard rounded-xl border-2 border-brand-dark overflow-auto custom-scrollbar flex items-center justify-center flex-grow p-4 min-h-[160px]">
                            
                            <!-- EXPORT TARGET -->
                            <div id="export-thermals-${inst.id}" class="export-wrapper" style="--t-main: ${theme.main}; --t-dark: ${theme.dark}; --t-light: ${theme.light}; --t-text-main: ${getContrastColor(theme.main)}; --t-text-dark: ${getContrastColor(theme.dark)};">
                                <div class="bg-[#FFFFFF] th-border-dark border rounded-2xl p-2 th-shadow-md w-max flex gap-2">
                                    <div class="th-bg-main th-border-dark border rounded-xl px-4 py-2 flex flex-col items-center justify-center">
                                        <span class="th-text-light text-[10px] font-black uppercase tracking-widest mb-0.5 drop-shadow-sm">Performance</span>
                                        <span class="th-text-on-main font-black text-xl leading-none flex items-baseline gap-1"><span class="render-fps">0</span> <span class="text-xs">FPS</span></span>
                                    </div>
                                    <div class="th-bg-dark th-border-dark border rounded-xl px-4 py-2 flex flex-col items-center justify-center">
                                        <span class="th-text-light text-[10px] font-black uppercase tracking-widest mb-0.5 drop-shadow-sm">Thermals</span>
                                        <span class="th-text-on-dark font-black text-xl leading-none render-temp">0°C</span>
                                    </div>
                                    <div class="th-bg-light th-border-dark border rounded-xl px-4 py-2 flex flex-col items-center justify-center">
                                        <span class="th-text-dark text-[10px] font-black uppercase tracking-widest mb-0.5">Sys Power</span>
                                        <span class="th-text-dark font-black text-xl leading-none render-tdp">0W</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 4. Combo Bar -->
                    <div class="bg-brand-main border-2 border-brand-dark rounded-2xl p-4 shadow-[4px_4px_0px_#463884] flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-white text-sm">4. Combo Bar</h3>
                            <button class="action-dl btn-chunky py-1.5 px-3 text-xs" data-target="export-combo-${inst.id}"><i data-lucide="download" class="w-3 h-3 pointer-events-none"></i> PNG</button>
                        </div>
                        <div class="bg-checkerboard rounded-xl border-2 border-brand-dark overflow-auto custom-scrollbar flex items-center justify-center flex-grow p-4 min-h-[160px]">
                            
                            <!-- EXPORT TARGET -->
                            <div id="export-combo-${inst.id}" class="export-wrapper" style="--t-main: ${theme.main}; --t-dark: ${theme.dark}; --t-light: ${theme.light}; --t-text-main: ${getContrastColor(theme.main)}; --t-text-dark: ${getContrastColor(theme.dark)};">
                                <div class="th-bg-main th-border-dark border rounded-2xl p-3 th-shadow flex items-center gap-4 w-max">
                                    <div class="flex items-center gap-4 pr-4 border-r" style="border-color: color-mix(in srgb, var(--t-light) 30%, transparent);">
                                        <div class="h-20 w-16 flex justify-center items-center bg-[#FFFFFF] rounded-lg overflow-hidden border border-[#FFFFFF] shrink-0 shadow-inner flex-shrink-0">
                                            <img src="${imgSrc}" class="render-combo-art w-full h-full object-cover block transform scale-105 origin-center">
                                        </div>
                                        <div class="flex flex-col justify-center">
                                            <span class="bg-[#FFFFFF] th-text-dark font-black uppercase tracking-widest text-[10px] px-2 py-0.5 rounded w-max mb-1.5 th-border-dark border th-shadow-sm render-platform whitespace-nowrap">System</span>
                                            <h1 class="font-black th-text-on-main text-xl uppercase tracking-tight leading-tight max-w-[500px] line-clamp-2 render-title">Game Title</h1>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="render-combo-settings grid grid-flow-col grid-rows-2 gap-2"></div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </section>
            </div>
            `;
        }

        // Fast targeted DOM update (no re-rendering)
        function updateInstancePreviews(wrapper, inst) {
            if(!wrapper) return;
            const theme = getTheme(inst.theme);
            
            // Text updates
            wrapper.querySelectorAll('.render-title').forEach(el => el.textContent = inst.title || "Game Title");
            wrapper.querySelectorAll('.render-platform').forEach(el => el.textContent = inst.platform || "System");
            wrapper.querySelector('.render-fps').textContent = inst.fps || "0";
            wrapper.querySelector('.render-temp').textContent = inst.temp || "0°C";
            wrapper.querySelector('.render-tdp').textContent = inst.tdp || "0W";

            // Theme Vars updates
            wrapper.querySelectorAll('.export-wrapper').forEach(el => {
                el.style.setProperty('--t-main', theme.main);
                el.style.setProperty('--t-dark', theme.dark);
                el.style.setProperty('--t-light', theme.light);
                el.style.setProperty('--t-text-main', getContrastColor(theme.main));
                el.style.setProperty('--t-text-dark', getContrastColor(theme.dark));
            });

            // Settings list updates
            const lines = (inst.settings || "").split('\n').filter(l => l.trim() !== '');
            const rSet = wrapper.querySelector('.render-settings');
            const rComboSet = wrapper.querySelector('.render-combo-settings');
            
            rSet.innerHTML = '';
            rComboSet.innerHTML = '';

            if (lines.length === 0) {
                const emptyMsg = `<div class="text-[#FFFFFF] font-bold text-sm italic opacity-50 uppercase">No settings</div>`;
                rSet.innerHTML = emptyMsg;
                rComboSet.innerHTML = emptyMsg;
            } else {
                lines.forEach(line => {
                    let key = line, val = "";
                    const colIdx = line.indexOf(':');
                    if (colIdx > -1) {
                        key = line.substring(0, colIdx).trim();
                        val = line.substring(colIdx + 1).trim();
                    }
                    rSet.insertAdjacentHTML('beforeend', `
                        <div class="flex justify-between items-center th-bg-main th-border-dark border rounded-lg p-2 px-3 gap-6 shadow-[1px_1px_0px_var(--t-dark)]">
                            <span class="th-text-light font-bold text-sm uppercase tracking-wide drop-shadow-sm">${key}</span>
                            <span class="th-text-on-main font-black text-md uppercase">${val}</span>
                        </div>
                    `);
                    rComboSet.insertAdjacentHTML('beforeend', `
                        <div class="th-bg-dark th-border-light border rounded-lg px-2.5 py-1 flex flex-col justify-center shadow-[2px_2px_0px_var(--t-dark)] min-w-[90px]">
                            <span class="th-text-light text-[8px] font-black uppercase tracking-widest leading-none mb-1 drop-shadow-sm">${key}</span>
                            <span class="th-text-on-dark font-black text-xs leading-none uppercase">${val}</span>
                        </div>
                    `);
                });
            }
        }

        function escapeHtml(text) {
            if(!text) return "";
            return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // --- EVENT DELEGATION (Inputs & Buttons) ---
        container.addEventListener('input', (e) => {
            const wrapper = e.target.closest('.instance-wrapper');
            if (!wrapper) return;
            const inst = instances.find(i => i.id === wrapper.dataset.id);
            if(!inst) return;

            if (e.target.classList.contains('input-title')) inst.title = e.target.value;
            if (e.target.classList.contains('input-platform')) inst.platform = e.target.value;
            if (e.target.classList.contains('input-settings')) inst.settings = e.target.value;
            if (e.target.classList.contains('input-fps')) inst.fps = e.target.value;
            if (e.target.classList.contains('input-temp')) inst.temp = e.target.value;
            if (e.target.classList.contains('input-tdp')) inst.tdp = e.target.value;
            if (e.target.classList.contains('input-url')) inst.url = e.target.value;
            
            if (e.target.classList.contains('custom-color-input')) {
                inst.theme = e.target.value;
                wrapper.querySelectorAll('.theme-btn').forEach(b => b.classList.replace('active', 'hover:scale-110'));
                const label = e.target.closest('label');
                label.style.background = inst.theme;
                label.classList.add('active', 'scale-110');
                label.classList.remove('hover:scale-110');
            }

            updateInstancePreviews(wrapper, inst);
            debouncedSaveState();
        });

        // Theme Clicks, Deletes, Downloads, URL loading, Image loading
        container.addEventListener('click', async (e) => {
            const wrapper = e.target.closest('.instance-wrapper');
            if (!wrapper) return;
            const inst = instances.find(i => i.id === wrapper.dataset.id);

            // Theme Select
            if (e.target.classList.contains('theme-btn')) {
                const themeKey = e.target.dataset.theme;
                inst.theme = themeKey;
                wrapper.querySelectorAll('.theme-btn').forEach(b => b.classList.replace('active', 'hover:scale-110'));
                e.target.classList.replace('hover:scale-110', 'active');
                
                const customLabel = wrapper.querySelector('.custom-color-input').closest('label');
                if (customLabel) {
                    customLabel.classList.remove('active', 'scale-110');
                    customLabel.classList.add('hover:scale-110');
                    customLabel.style.background = 'conic-gradient(red, yellow, lime, aqua, blue, magenta, red)';
                }

                updateInstancePreviews(wrapper, inst);
                debouncedSaveState();
            }

            // Delete
            if (e.target.classList.contains('action-delete')) {
                instances = instances.filter(i => i.id !== inst.id);
                wrapper.remove();
                debouncedSaveState();
            }

            // URL Load
            if (e.target.classList.contains('action-load-url')) {
                if(!inst.url) return;
                const btn = e.target;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 pointer-events-none animate-spin"></i>`;
                lucide.createIcons();
                try {
                    const b64 = await getBase64ImageFromUrl(inst.url);
                    inst.localImage = b64;
                    wrapper.querySelectorAll('.render-art, .render-combo-art').forEach(el => el.src = b64);
                    debouncedSaveState();
                } catch(err) {
                    alert("CORS Error: The host blocks fetching. Please download the image and use the local file option.");
                } finally {
                    btn.innerHTML = orig;
                    lucide.createIcons();
                }
            }

            // Download
            if (e.target.classList.contains('action-dl')) {
                const targetId = e.target.dataset.target;
                const btn = e.target;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="loader" class="w-3 h-3 pointer-events-none animate-spin"></i> ...`;
                lucide.createIcons();

                const node = document.getElementById(targetId);
                await document.fonts.ready;
                try {
                    const dataUrl = await htmlToImage.toPng(node, { pixelRatio: 3, backgroundColor: 'rgba(0,0,0,0)', style: { margin: '0' }});
                    const link = document.createElement('a');
                    let fName = inst.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    if(!fName) fName = "overlay";
                    link.download = `RR_${fName}_${targetId.split('-')[1]}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch(err) { console.error("Export error", err); } 
                finally {
                    btn.innerHTML = orig;
                    lucide.createIcons();
                }
            }
        });

        // Local Image Selection
        container.addEventListener('change', (e) => {
            if(e.target.classList.contains('input-image')) {
                const wrapper = e.target.closest('.instance-wrapper');
                const inst = instances.find(i => i.id === wrapper.dataset.id);
                const file = e.target.files[0];
                if (file) {
                    let fn = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
                    fn = fn.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
                    
                    if(!inst.title || inst.title === 'God of War II') {
                        inst.title = fn;
                        wrapper.querySelector('.input-title').value = fn;
                    }
                    saveTitleToHistory(fn);

                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        inst.localImage = ev.target.result;
                        wrapper.querySelectorAll('.render-art, .render-combo-art').forEach(el => el.src = ev.target.result);
                        updateInstancePreviews(wrapper, inst);
                        debouncedSaveState();
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        // Focus Out (Save History)
        container.addEventListener('focusout', (e) => {
            if(e.target.classList.contains('input-title')) saveTitleToHistory(e.target.value);
        });

        // --- GLOBAL BUTTONS ---
        document.getElementById('add-instance-btn').addEventListener('click', () => {
            const newInst = createDefaultInstance();
            // Inherit from last instance if available to speed up workflow
            if (instances.length > 0) {
                const last = instances[instances.length - 1];
                newInst.platform = last.platform;
                newInst.settings = last.settings;
                newInst.theme = last.theme;
                newInst.title = "";
            }
            instances.push(newInst);
            renderInstances();
            debouncedSaveState();
            // Scroll to bottom
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        // --- DRAG AND DROP BATCH SYSTEM ---
        let dragCounter = 0;
        const dropZone = document.getElementById('drop-zone');

        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropZone.classList.remove('hidden');
            dropZone.classList.add('flex');
        });
        window.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.add('hidden');
                dropZone.classList.remove('flex');
            }
        });
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.add('hidden');
            dropZone.classList.remove('flex');

            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;

            // Inherit config from last instance
            let basePlatform = "System", baseSettings = "Resolution: 1x\nDriver: Default", baseTheme = "purple";
            if (instances.length > 0) {
                const last = instances[instances.length - 1];
                basePlatform = last.platform; baseSettings = last.settings; baseTheme = last.theme || "purple";
            }

            for (const file of files) {
                let fn = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
                fn = fn.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());

                const base64 = await new Promise((res) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => res(ev.target.result);
                    reader.readAsDataURL(file);
                });

                instances.push({
                    id: crypto.randomUUID(),
                    title: fn, platform: basePlatform, settings: baseSettings,
                    fps: "60", temp: "45°C", tdp: "15W",
                    url: "", localImage: base64, theme: baseTheme
                });
                saveTitleToHistory(fn);
            }
            renderInstances();
            debouncedSaveState();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        // --- FETCH PROXY LOGIC ---
        async function getBase64ImageFromUrl(imageUrl) {
            const fetchMethods = [
                { name: 'Direct', url: '', encode: false },
                { name: 'AllOrigins', url: 'https://api.allorigins.win/raw?url=', encode: true },
                { name: 'CorsProxy', url: 'https://corsproxy.io/?url=', encode: true }
            ];
            for (const method of fetchMethods) {
                try {
                    const fetchUrl = method.encode ? method.url + encodeURIComponent(imageUrl) : imageUrl;
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const opts = { method: 'GET', signal: controller.signal };
                    if (method.name === 'Direct') opts.mode = 'cors';
                    
                    const res = await fetch(fetchUrl, opts);
                    clearTimeout(timeoutId);
                    if (!res.ok) continue;
                    
                    const blob = await res.blob();
                    if (!blob.type.startsWith('image/')) continue;

                    return await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                } catch (err) { /* silent fail, try next */ }
            }
            throw new Error("Proxy exhausted.");
        }

    </script>
